<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnike</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <!-- Recharts (Grafikler için - React and ReactDOM must be loaded before Recharts) -->
    <script src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        .drag-active {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }

        /* Animasyonlar */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        .card-selected {
            ring-width: 4px;
            transform: scale(1.02);
            transition: all 0.2s;
        }

        /* Input stili */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- İkon Bileşenleri (SVG) ---

        const Upload = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="17 8 12 3 7 8" /><line x1="12" y1="3" x2="12" y2="15" />
            </svg>
        );

        const FileText = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /><polyline points="10 9 9 9 8 9" />
            </svg>
        );

        const User = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" />
            </svg>
        );

        const Clock = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" />
            </svg>
        );

        const BarChart = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line>
            </svg>
        );

        const AlertCircle = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
        );

        const Calendar = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
        );

        const Briefcase = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
            </svg>
        );

        const ChevronLeft = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="15 18 9 12 15 6"></polyline></svg>
        );
        const ChevronDown = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m6 9 6 6 6-6" /></svg>
        );

        const ChevronRight = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="9 18 15 12 9 6"></polyline></svg>
        );

        const Eye = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0" /><circle cx="12" cy="12" r="3" /></svg>
        );

        const X = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
        );

        const TrendingUp = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
        );

        const Layout = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
        );

        const Activity = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
        );

        const PieChartIcon = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>
        );

        const ClockIcon = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        );

        const Edit = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z" /><path d="m15 5 4 4" /></svg>
        );

        const Trash2 = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /></svg>
        );

        // --- Yardımcı Fonksiyonlar ---

        const timeToMinutes = (timeStr) => {
            if (!timeStr) return null;
            const cleanTime = timeStr.replace('.', ':').trim();
            const [hours, minutes] = cleanTime.split(':').map(Number);
            if (isNaN(hours) || isNaN(minutes)) return null;
            return hours * 60 + minutes;
        };

        const minutesToTime = (mins) => {
            if (mins === null || mins === undefined) return "";
            const h = Math.floor(mins / 60).toString().padStart(2, '0');
            const m = (mins % 60).toString().padStart(2, '0');
            return `${h}:${m}`;
        };

        // --- Takvim ---
        const MiniCalendar = ({ selectedDate, onSelectDate, highlightedDates = [] }) => {
            const [currentDate, setCurrentDate] = useState(new Date("2026-03-01T00:00:00"));

            const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
            const firstDayOfMonth = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();

            const monthNames = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
            const dayNames = ["Pt", "Sa", "Ça", "Pe", "Cu", "Ct", "Pz"];
            const firstDayIndex = firstDayOfMonth === 0 ? 6 : firstDayOfMonth - 1;

            const prevMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));
            const nextMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));

            const days = [];
            for (let i = 0; i < firstDayIndex; i++) days.push(null);
            for (let i = 1; i <= daysInMonth; i++) days.push(i);

            return (
                <div className="w-full select-none font-sans mt-2">
                    <div className="flex items-center justify-between mb-4 px-2">
                        <button onClick={prevMonth} className="p-1 hover:bg-gray-100 rounded text-gray-400 hover:text-gray-700 transition"><ChevronLeft className="w-4 h-4" /></button>
                        <span className="font-bold text-[14px] text-gray-700">{monthNames[currentDate.getMonth()]} {currentDate.getFullYear()}</span>
                        <button onClick={nextMonth} className="p-1 hover:bg-gray-100 rounded text-gray-400 hover:text-gray-700 transition"><ChevronRight className="w-4 h-4" /></button>
                    </div>
                    <div className="grid grid-cols-7 gap-1 text-center mb-2">
                        {dayNames.map(d => <span key={d} className="text-xs font-bold text-gray-400">{d}</span>)}
                    </div>
                    <div className="grid grid-cols-7 gap-y-1 gap-x-1 text-center text-[13px] text-gray-500 font-medium">
                        {days.map((d, i) => {
                            if (!d) return <div key={i} className="h-7 w-7 mx-auto"></div>;
                            const dayStr = String(d).padStart(2, '0');
                            const monthStr = String(currentDate.getMonth() + 1).padStart(2, '0');
                            const yearStr = currentDate.getFullYear();
                            const fullDateStr = `${dayStr}.${monthStr}.${yearStr}`;

                            const isSelected = selectedDate === fullDateStr;
                            const isHighlighted = highlightedDates.includes(fullDateStr);

                            return (
                                <div
                                    key={i}
                                    onClick={() => onSelectDate(isSelected ? null : fullDateStr)}
                                    className={`relative h-7 w-7 mx-auto flex items-center justify-center rounded-full cursor-pointer transition-colors ${isSelected ? 'bg-blue-600 text-white font-bold shadow-md' : 'hover:bg-gray-100 text-gray-600'}`}
                                >
                                    {d}
                                    {isHighlighted && !isSelected && (
                                        <div className="absolute bottom-0 left-1/2 -translate-x-1/2 w-1 h-1 bg-blue-500 rounded-full"></div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // --- Dashboard Modal Bileşeni ---
        const DashboardModal = ({ isOpen, onClose, data, rules }) => {
            if (!isOpen || !data) return null;

            // Recharts CDN Global Güvenliği (Farklı isimlendirme olasılıkları için)
            const RechartsLib = window.Recharts || Recharts;

            if (!RechartsLib) {
                console.error("Recharts kütüphanesi bulunamadı! window.Recharts:", window.Recharts);
                return (
                    <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm">
                        <div className="bg-white p-8 rounded-2xl shadow-xl">
                            <h2 className="text-xl font-bold text-red-600">Hata</h2>
                            <p className="text-gray-600 mt-2">Grafik kütüphanesi (Recharts) yüklenemedi. Lütfen internet bağlantınızı kontrol edin.</p>
                            <button onClick={onClose} className="mt-4 px-6 py-2 bg-gray-800 text-white rounded-lg">Kapat</button>
                        </div>
                    </div>
                );
            }

            const {
                ResponsiveContainer, BarChart: RBarChart, Bar, XAxis, YAxis, CartesianGrid,
                Tooltip, Legend, LineChart: RLineChart, Line, PieChart: RPieChart, Pie, Cell,
                AreaChart, Area
            } = RechartsLib;

            // Veri İşleme (Grafikler için) - Defansif Yaklaşım
            const details = Array.isArray(data.details) ? data.details : [];

            // 1. Hedef vs Gerçekleşen (Günlük Ortalama)
            const workHoursMap = {};
            details.forEach(curr => {
                if (!curr || curr.isHoliday || curr.isOnLeave || curr.status === 'Gelmedi' || !curr.date) return;

                const date = curr.date;
                if (!workHoursMap[date]) {
                    workHoursMap[date] = { date, gercek: 0, hedef: 8.5 };
                }

                if (curr.entry && curr.exit && typeof curr.entry === 'string' && typeof curr.exit === 'string') {
                    const eParts = curr.entry.split(':');
                    const xParts = curr.exit.split(':');
                    if (eParts.length >= 2 && xParts.length >= 2) {
                        const eh = parseInt(eParts[0]);
                        const em = parseInt(eParts[1]);
                        const xh = parseInt(xParts[0]);
                        const xm = parseInt(xParts[1]);

                        if (!isNaN(eh) && !isNaN(xh)) {
                            const diff = (xh * 60 + (xm || 0)) - (eh * 60 + (em || 0));
                            workHoursMap[date].gercek += Math.max(0, diff / 60);
                        }
                    }
                }
            });

            const barChartData = Object.values(workHoursMap)
                .sort((a, b) => {
                    const [d1, m1, y1] = a.date.split('.').map(Number);
                    const [d2, m2, y2] = b.date.split('.').map(Number);
                    return new Date(y1, m1 - 1, d1) - new Date(y2, m2 - 1, d2);
                })
                .slice(-10);

            // 2. Performans Skoru Trendi
            const performanceData = barChartData.map(d => ({
                name: d.date,
                skor: Math.min(100, Math.round((d.gercek / d.hedef) * 100))
            }));

            // 3. Geç Kalma / Erken Çıkış Dağılımı
            const lateCount = details.filter(d => d && d.isLate).length;
            const earlyCount = details.filter(d => d && d.isEarlyExit).length;
            const promptCount = details.filter(d => d && d.status === 'Geldi' && !d.isLate && !d.isEarlyExit).length;

            const pieData = [
                { name: 'Zamanında', value: promptCount, color: '#10b981' },
                { name: 'Geç Giriş', value: lateCount, color: '#f59e0b' },
                { name: 'Erken Çıkış', value: earlyCount, color: '#ef4444' }
            ].filter(d => d.value > 0);

            // 4. Fazla Mesai Analizi (Personel Bazlı)
            const overtimeByPerson = {};
            details.forEach(curr => {
                if (curr && curr.isOvertime && curr.name) {
                    overtimeByPerson[curr.name] = (overtimeByPerson[curr.name] || 0) + 1;
                }
            });
            const overtimeChartData = Object.entries(overtimeByPerson)
                .map(([name, count]) => ({ name, count }))
                .sort((a, b) => b.count - a.count)
                .slice(0, 5);

            // 5. Turnike Yoğunluk Analizi (Saat Bazlı)
            const hourIntensity = new Array(24).fill(0).map((_, i) => ({ saat: `${i}:00`, giris: 0, cikis: 0 }));
            details.forEach(d => {
                if (!d) return;
                if (d.entry && typeof d.entry === 'string') {
                    const h = parseInt(d.entry.split(':')[0]);
                    if (!isNaN(h) && h >= 0 && h < 24) hourIntensity[h].giris++;
                }
                if (d.exit && typeof d.exit === 'string') {
                    const h = parseInt(d.exit.split(':')[0]);
                    if (!isNaN(h) && h >= 0 && h < 24) hourIntensity[h].cikis++;
                }
            });
            const heatmapData = hourIntensity.filter(d => d.giris > 0 || d.cikis > 0);

            // 6. Anomali Listesi
            const anomalies = details.filter(d => {
                if (!d) return false;
                const note = d.note || "";
                return note.includes("ÇIKIŞ YOK") || note.includes("GİRİŞ YOK") || (d.isWeekend && d.status === 'Geldi');
            }).slice(0, 10);

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-7xl max-h-[90vh] flex flex-col overflow-hidden border border-gray-100 animate-slide-up">
                        {/* Header */}
                        <div className="px-8 py-5 border-b border-gray-100 flex items-center justify-between bg-white sticky top-0 z-10">
                            <div className="flex items-center gap-3">
                                <div className="p-2.5 bg-blue-600 rounded-xl shadow-lg shadow-blue-200">
                                    <TrendingUp className="w-6 h-6 text-white" />
                                </div>
                                <div>
                                    <h2 className="text-xl font-bold text-gray-800 tracking-tight">Analiz ve Gösterge Paneli</h2>
                                    <p className="text-xs text-gray-500 font-medium mt-0.5 uppercase tracking-wider">Yönetici Stratejik Veri Görselleştirme</p>
                                </div>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-gray-100 rounded-full transition-colors group">
                                <X className="w-6 h-6 text-gray-400 group-hover:text-gray-600" />
                            </button>
                        </div>

                        {/* Content */}
                        <div className="flex-1 overflow-y-auto p-8 bg-gray-50/50 custom-scrollbar">
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

                                {/* 1. Hedef vs Gerçekleşen */}
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                    <div className="flex items-center gap-2 mb-6 border-b border-gray-50 pb-3">
                                        <BarChart className="w-5 h-5 text-blue-500" />
                                        <h3 className="font-bold text-gray-700">Hedef vs. Gerçekleşen (Saat)</h3>
                                    </div>
                                    <div className="h-[250px] w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <RBarChart data={barChartData}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                <XAxis dataKey="date" fontSize={10} tick={{ fill: '#64748b' }} axisLine={false} tickLine={false} />
                                                <YAxis fontSize={10} tick={{ fill: '#64748b' }} axisLine={false} tickLine={false} />
                                                <Tooltip contentStyle={{ borderRadius: '12px', border: 'none', boxShadow: '0 10px 15px -3px rgb(0 0 0 / 0.1)' }} />
                                                <Legend iconType="circle" wrapperStyle={{ paddingTop: '20px', fontSize: '11px' }} />
                                                <Bar name="Gerçekleşen" dataKey="gercek" fill="#3b82f6" radius={[4, 4, 0, 0]} barSize={20} />
                                                <Bar name="Hedef (8.5h)" dataKey="hedef" fill="#e2e8f0" radius={[4, 4, 0, 0]} barSize={20} />
                                            </RBarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>

                                {/* 2. Verimlilik Trendi */}
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                    <div className="flex items-center gap-2 mb-6 border-b border-gray-50 pb-3">
                                        <Activity className="w-5 h-5 text-emerald-500" />
                                        <h3 className="font-bold text-gray-700">Verimlilik Trendi (%)</h3>
                                    </div>
                                    <div className="h-[250px] w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <RLineChart data={performanceData}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                <XAxis dataKey="name" fontSize={10} tick={{ fill: '#64748b' }} axisLine={false} tickLine={false} />
                                                <YAxis fontSize={10} tick={{ fill: '#64748b' }} axisLine={false} tickLine={false} domain={[0, 100]} />
                                                <Tooltip />
                                                <Line type="monotone" dataKey="skor" stroke="#10b981" strokeWidth={3} dot={{ r: 4, fill: '#10b981' }} activeDot={{ r: 6 }} name="Verimlilik Skoru" />
                                            </RLineChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>

                                {/* 3. Mesai Uyumu */}
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                    <div className="flex items-center gap-2 mb-6 border-b border-gray-50 pb-3">
                                        <PieChartIcon className="w-5 h-5 text-amber-500" />
                                        <h3 className="font-bold text-gray-700">Mesai Uyumu Analizi</h3>
                                    </div>
                                    <div className="h-[250px] w-full">
                                        <ResponsiveContainer width="100%" height="100%">

                            pdfLinks.push(url);

                        if (pdfLinks.length === 0) return;
                        setIsProcessing(true);
                        let allParsedData = [];

            const extractTextFromPDF = async () => {

                                    if (currentRowText.length > 0) {

                            fullText += rows.join("\n") + "\n";
                        }
                        const fileParsedData = parseRawText(fullText, currentFile);
                        allParsedData = [...allParsedData, ...fileParsedData];
                    }

                    setParsedRows(prev => {

                    console.error(err);

                    setIsProcessing(false);

            const parseRawText = (text, sourceFile) => {
                const lines = text.split('\n');
                const data = [];
                const dateRegex = /(\d{2}\.\d{2}\.\d{4})/;

                let documentDate = null;
                if (sourceFile && sourceFile.name) {
                    const matchPattern = sourceFile.name.match(dateRegex);
                    if (matchPattern) documentDate = matchPattern[0];
                }
                let lastFoundDate = documentDate;

                lines.forEach(line => {
                    let cleanLine = line.trim();
                    if (!cleanLine) return;

                    let rowDate = documentDate;
                    const dateMatch = cleanLine.match(dateRegex);

                    if (dateMatch) {
                        if (!rowDate) rowDate = dateMatch[0];
                        cleanLine = cleanLine.replace(dateMatch[0], "   ");
                    }
                    if (!rowDate) rowDate = lastFoundDate;
                    if (!rowDate) return;

                    const timeRegex = /(\d{1,2}[:.]\d{2})/g;
                    const times = cleanLine.match(timeRegex) || [];

                    let namePart = cleanLine.replace(timeRegex, " ").toLocaleUpperCase('tr-TR');

                    const wordsToRemove = [
                        "GEÇ GİRİŞ", "ERKEN ÇIKIŞ", "ÇIKIŞ YOK", "GİRİŞ YOK", "GEÇ", "ERKEN",
                        "GİRİŞ", "ÇIKIŞ", "GELMEDİ", "GELMEDI", "HAFTASONU", "GENEL TATİL", "GENEL TATIL",
                        "YILLIK İZİNLİ", "YILLIK İZİN", "YILLIK İZIN", "İZİNLİ", "IZINLI", "İZİN", "IZIN",
                        "RAPORLU", "RAPOR", "GÖREVLİ", "NORMAL", "YOK"
                    ];
                    wordsToRemove.forEach(w => {
                        namePart = namePart.split(w).join(" ");
                    });

                    namePart = namePart.replace(/[0-9\-_\*\/\\,;\"\(\)]/g, ' ');
                    namePart = namePart.replace(/\s+/g, ' ').trim();

                    if (namePart.length < 3) return;

                    const excludeWords = ["SAYFA", "RAPOR", "TURNİKE", "ŞİRKET", "LİSTESİ", "TARİH", "SAAT", "PERSONEL", "BELGE", "MÜDÜRLÜĞÜ", "DAİRESİ", "BAŞKANLIĞI"];
                    if (excludeWords.some(ex => namePart.includes(ex))) return;

                    const upperLine = cleanLine.toLocaleUpperCase('tr-TR');

                    // Güvenlik: Eğer satırda hiç turnike saati yoksa (izin, tatil, başlık çöpleri vb)
                    if (times.length === 0) {
                        // O halde listeye alınması için geçerli bir personel adı taşıması ŞARTTIR.
                        const isKnownPersonnel = personnelList.some(p => upperLine.includes(p.name));
                        if (!isKnownPersonnel) return;
                    }

                    // Onaylandı, satırdaki veya belgedeki mevcut son tarihi yedeğe al:
                    lastFoundDate = rowDate;

                    let note = "";
                    const keywords = ["GELMEDİ", "GELMEDI", "HAFTASONU", "GENEL TATİL", "GENEL TATIL", "ÇIKIŞ YOK", "GİRİŞ YOK", "YILLIK İZİNLİ", "YILLIK İZİN", "İZİNLİ", "IZINLI", "İZİN", "IZIN", "RAPORLU", "RAPOR", "GÖREVLİ"];

                    keywords.forEach(k => {
                        if (upperLine.includes(k)) {
                            let normalizedKey = k;
                            if (k.includes("GELMEDI")) normalizedKey = "GELMEDİ";
                            if (k.includes("TATIL")) normalizedKey = "GENEL TATİL";
                            if (k.includes("İZİN") || k.includes("IZIN") || k.includes("RAPOR") || k.includes("YILLIK")) normalizedKey = "İZİN";

                            if (!note.includes(normalizedKey)) {
                                note += normalizedKey + " ";
                            }
                        }
                    });

                    data.push({
                        raw: cleanLine,
                        name: namePart,
                        date: rowDate,
                        foundTimes: times,
                        note: note.trim(),
                        sourceFile: sourceFile
                    });
                });

                return data;
            };

            const calculateStatistics = useCallback(() => {
                if (!parsedRows.length) return;

                // Dinamik Akıllı Eşleştirme: Her bir kaydı, yeni personel eklense bile, listeye göre dinamik tara:
                const mappedRows = parsedRows.map(row => {
                    let finalName = row.name;
                    for (const p of personnelList) {
                        if (finalName.includes(p.name)) {
                            finalName = p.name;
                            break;
                        }
                    }
                    return { ...row, matchedName: finalName };
                });

                const recordMap = new Map();

                // Matris Dinamik Oluşturma (Sadece O Tarihte PDF'te Adı Geçenler)
                uniqueDatesList.forEach(date => {
                    const personnelForThisDate = [...new Set(
                        mappedRows.filter(r => r.date === date).map(r => r.matchedName)
                    )].sort((a, b) => a.localeCompare(b, 'tr-TR'));

                    personnelForThisDate.forEach(name => {
                        recordMap.set(`${date}|${name}`, {
                            date: date,
                            name: name,
                            allTimes: [],
                            notes: new Set(["GELMEDİ"])
                        });
                    });
                });

                // Gerçek kayıt verilerini matrise doldur, var olanların "GELMEDİ" etiketini sil (işlem gereği):
                mappedRows.forEach(row => {
                    const key = `${row.date}|${row.matchedName}`;
                    if (recordMap.has(key)) {
                        const rec = recordMap.get(key);
                        rec.notes.delete("GELMEDİ");

                        if (row.foundTimes && row.foundTimes.length > 0) {
                            row.foundTimes.forEach(t => {
                                const mins = timeToMinutes(t);
                                if (mins !== null) rec.allTimes.push(mins);
                            });
                        }
                        if (row.note) rec.notes.add(row.note.toLocaleUpperCase('tr-TR'));
                        if (row.sourceFile && !rec.sourceFile) {
                            rec.sourceFile = row.sourceFile;
                        }
                    }
                });

                if (recordMap.size === 0) {
                    setError("Bu isimde veya tarihte kayıt bulunamadı.");
                    setStats(null);
                    return;
                }

                let totalUniqueDays = 0;
                let gelmediCount = 0;
                let geldiCount = 0;
                let gecGirisCount = 0;
                let erkenCikisCount = 0;
                let overtimeCount = 0;
                let izinliCount = 0;

                const processedDays = [];

                recordMap.forEach((dayData) => {
                    dayData.allTimes.sort((a, b) => a - b);

                    const combinedNotes = Array.from(dayData.notes).join(" ");

                    const [dayStr, monthStr, yearStr] = dayData.date.split('.');
                    const d = new Date(yearStr, monthStr - 1, dayStr);
                    const dayOfWeek = d.getDay();
                    const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;

                    const firstEntry = dayData.allTimes.length > 0 ? dayData.allTimes[0] : null;
                    const lastExit = dayData.allTimes.length > 1 ? dayData.allTimes[dayData.allTimes.length - 1] : null;

                    let isAbsent = false;
                    let isLate = false;
                    let isEarlyExit = false;
                    let isPresent = false;
                    let isOvertime = false;
                    let isOnLeave = false;

                    const isWeekendOrHoliday = isWeekend || combinedNotes.includes("HAFTASONU") || combinedNotes.includes("TATİL");

                    if (combinedNotes.includes("İZİN") || combinedNotes.includes("RAPOR") || combinedNotes.includes("GÖREVLİ")) {
                        isOnLeave = true;
                    }

                    if (combinedNotes.includes("GELMEDİ")) {
                        isAbsent = true;
                    }

                    // --- TÜM LİSTE GETİRME (FİLTRELERİ KALDIRDIK) ---
                    // Tüm günleri listeye ekliyoruz.
                    totalUniqueDays++;

                    let effectiveExit = lastExit;

                    if (!isAbsent && (effectiveExit !== null || firstEntry !== null)) {
                        isPresent = true;
                    }

                    // 3. Geç Giriş Kontrolü
                    // KURAL: Sadece Hafta İçi (!isWeekendOrHoliday) VE Giriş Saati VARSA (firstEntry !== null).
                    if (!isWeekendOrHoliday && isPresent && firstEntry !== null) {
                        if (firstEntry > RULES.morningStart) {
                            if (firstEntry < RULES.morningEnd) isLate = true;
                            if (firstEntry > RULES.afternoonStart) isLate = true;
                        }
                    }

                    // 4. Erken Çıkış Kontrolü
                    // KURAL: Sadece Hafta İçi (!isWeekendOrHoliday) ise Erken Çıkış say.
                    if (!isWeekendOrHoliday && isPresent && effectiveExit !== null) {
                        if (effectiveExit < RULES.afternoonEnd) {
                            isEarlyExit = true;
                        }
                    }

                    // 5. Fazla Mesai Kontrolü
                    if (isPresent) {
                        if (isWeekendOrHoliday) {
                            // Hafta sonu giriş varsa fazla mesaidir
                            if (firstEntry !== null) {
                                isOvertime = true;
                            }
                        }
                        else {
                            // Hafta İçi:
                            // KURAL: Çıkış saati YOKSA (veya ÇIKIŞ YOK hatası varsa) hesaplama.
                            // Sadece çıkış saati varsa (effectiveExit !== null) hesapla.
                            if (effectiveExit !== null && !combinedNotes.includes("ÇIKIŞ YOK")) {
                                // 1. Akşam 18:30'den sonra çıkış (GİRİŞE BAKILMIYOR ARTIK)
                                const isLateEnd = effectiveExit > RULES.standardEnd;

                                if (isLateEnd) {
                                    isOvertime = true;
                                }
                            }
                        }
                    }

                    // SAYAÇ HESAPLAMA
                    // Hafta sonları Geldi, Gelmedi, Geç, Erken sayaçlarına ASLA dahil edilmez.

                    let finalStatus = 'Boş';
                    if (isAbsent) finalStatus = 'Gelmedi';
                    else if (isOnLeave) finalStatus = 'İzinli';
                    else if (isPresent) finalStatus = 'Geldi';
                    else if (isWeekendOrHoliday) finalStatus = 'Tatil/Haftasonu';

                    if (isAbsent && !isWeekendOrHoliday && !isOnLeave) gelmediCount++;
                    if (isPresent && !isWeekendOrHoliday && !isOnLeave) geldiCount++;
                    if (isLate && !isWeekendOrHoliday && !isOnLeave) gecGirisCount++;
                    if (isEarlyExit && !isWeekendOrHoliday && !isOnLeave) erkenCikisCount++;

                    if (isOnLeave && !isWeekendOrHoliday) izinliCount++;

                    if (isOvertime) overtimeCount++;

                    const displayEntry = (isAbsent || isOnLeave || firstEntry === null) ? '' : minutesToTime(firstEntry);
                    const displayExit = (isAbsent || isOnLeave || effectiveExit === null) ? '' : minutesToTime(effectiveExit);

                    processedDays.push({
                        date: dayData.date,
                        name: dayData.name,
                        status: finalStatus,
                        entry: displayEntry,
                        exit: displayExit,
                        isLate,
                        isEarlyExit,
                        isOvertime,
                        isOnLeave,
                        isWeekend,
                        isHoliday: isWeekendOrHoliday,
                        note: combinedNotes,
                        sourceFile: dayData.sourceFile
                    });
                });

                processedDays.sort((a, b) => {
                    const da = a.date.split('.').reverse().join('');
                    const db = b.date.split('.').reverse().join('');
                    return da.localeCompare(db);
                });

                setStats({
                    totalUniqueDays,
                    gelmediCount,
                    geldiCount,
                    gecGirisCount,
                    erkenCikisCount,
                    overtimeCount,
                    izinliCount,
                    details: processedDays
                });
                setActiveFilter('ALL');
                setError(null);
            }, [parsedRows, personnelList, uniqueDatesList, RULES]);

            useEffect(() => {
                if (files && files.length > 0) {
                    extractTextFromPDF();
                }
            }, [files]);

            useEffect(() => {
                if (parsedRows.length > 0) {
                    calculateStatistics();
                }
            }, [toleranceEnabled, toleranceMinutes, calculateStatistics, parsedRows]);

            const baseFilteredDetails = useMemo(() => {
                if (!stats || !stats.details) return [];
                let temp = stats.details;

                // 1. Sol Menü Personel Filtresi
                if (selectedPersonnel !== "TÜMÜ") {
                    temp = temp.filter(d => d.name === selectedPersonnel);
                }

                // 2. Global Search (İsim, Tarih, Durum, Not)
                if (globalSearch.trim()) {
                    const term = globalSearch.toLocaleLowerCase('tr-TR').trim();
                    temp = temp.filter(d =>
                        d.name.toLocaleLowerCase('tr-TR').includes(term) ||
                        d.date.includes(term) ||
                        (d.note && d.note.toLocaleLowerCase('tr-TR').includes(term)) ||
                        d.status.toLocaleLowerCase('tr-TR').includes(term)
                    );
                }

                // 3. Takvim Filtresi
                if (selectedCalendarDate) {
                    temp = temp.filter(d => d.date === selectedCalendarDate);
                }

                return temp;
            }, [stats, selectedPersonnel, globalSearch, selectedCalendarDate]);

            const dynamicStats = useMemo(() => {
                let gelmediCount = 0;
                let geldiCount = 0;
                let gecGirisCount = 0;
                let erkenCikisCount = 0;
                let overtimeCount = 0;
                let izinliCount = 0;
                let uniqueDaysSet = new Set();

                if (baseFilteredDetails) {
                    baseFilteredDetails.forEach(d => {
                        uniqueDaysSet.add(d.date);

                        if (d.status === 'Gelmedi' && !d.isHoliday && !d.isOnLeave) gelmediCount++;
                        if (d.status === 'Geldi' && !d.isHoliday && !d.isOnLeave) geldiCount++;
                        if (d.isLate && !d.isHoliday && !d.isOnLeave) gecGirisCount++;
                        if (d.isEarlyExit && !d.isHoliday && !d.isOnLeave) erkenCikisCount++;
                        if (d.isOnLeave && !d.isHoliday) izinliCount++;
                        if (d.isOvertime) overtimeCount++;
                    });
                }

                return {
                    totalUniqueDays: uniqueDaysSet.size,
                    gelmediCount, geldiCount, gecGirisCount, erkenCikisCount, overtimeCount, izinliCount,
                    details: baseFilteredDetails

                    case 'EARLY': temp = temp.filter(d => d.isEarlyExit && !d.isHoliday); break;
                    case 'OVERTIME': temp = temp.filter(d => d.isOvertime); break;

                    case 'EARLY': return "Filtre: Erken Çıktığı Günler (Hafta İçi)";

                                    </div>

                                    {/* Tablo / Akordiyon Alanı */}
                                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden mb-8">
                                        <div className="bg-gray-50/80 px-5 py-3.5 border-b border-gray-200 flex justify-between items-center">
                                            <h3 className="text-sm font-semibold text-gray-700">{getFilterTitle()}</h3>
                                        </div>
                                        <div className="max-h-[60vh] overflow-y-auto custom-scrollbar">
                                            {(() => {
                                                const groupedByDate = filteredDetails.reduce((acc, current) => {
                                                    if (!acc[current.date]) acc[current.date] = [];
                                                    acc[current.date].push(current);
                                                    return acc;
                                                }, {});

                                                const dateKeys = Object.keys(groupedByDate).sort((a, b) => {
                                                    const d1 = a.split('.').reverse().join('');
                                                    const d2 = b.split('.').reverse().join('');
                                                    return d2.localeCompare(d1);
                                                });

                                                if (dateKeys.length === 0) {
                                                    return (
                                                        <div className="px-5 py-16 text-center text-gray-500">
                                                            <div className="flex flex-col items-center justify-center">
                                                                <FileText className="w-10 h-10 text-gray-300 mb-3" />
                                                                <p className="text-base font-medium text-gray-500">Kayıt Bulunamadı</p>
                                                                <p className="text-sm mt-1 text-gray-400">Bu kriterlere uygun bir veri yok.</p>
                                                            </div>
                                                        </div>
                                                    );
                                                }

                                                return dateKeys.map((dateKey, idx) => (
                                                    <details key={dateKey} className="group border-b border-gray-100 last:border-none" open={idx < 3}>
                                                        <summary className="flex cursor-pointer items-center justify-between bg-white px-5 py-4 hover:bg-gray-50/50 transition-colors list-none select-none outline-none">
                                                            <div className="flex items-center gap-3">
                                                                <div className="w-8 h-8 rounded bg-blue-50 text-blue-600 flex items-center justify-center font-bold text-sm shadow-sm ring-1 ring-blue-100">
                                                                    <span>{groupedByDate[dateKey].length}</span>
                                                                </div>
                                                                <h4 className="text-[15px] font-bold text-gray-800">{dateKey}</h4>
                                                                {(() => {
                                                                    const sourceFile = groupedByDate[dateKey].find(r => r.sourceFile)?.sourceFile;
                                                                    if (sourceFile) {
                                                                        return (
                                                                            <button
                                                                                onClick={(e) => {
                                                                                    e.preventDefault();
                                                                                    e.stopPropagation();
                                                                                    const pdfUrl = sourceFile.size ? URL.createObjectURL(sourceFile) : `/turnike_kayıt/${sourceFile.name}`;
                                                                                    setSelectedPdfBlob(pdfUrl);
                                                                                }}
                                                                                className="ml-3 flex items-center gap-1.5 text-[11px] font-bold text-blue-600 bg-blue-50 border border-blue-200 hover:bg-blue-600 hover:text-white px-2.5 py-1 rounded-lg transition-colors shadow-sm"
                                                                            >
                                                                                <Eye className="w-3.5 h-3.5" /> PDF Önizleme
                                                                            </button>
                                                                        );
                                                                    }
                                                                    return null;
                                                                })()}
                                                            </div>
                                                            <div className="text-gray-400 group-open:rotate-180 transition-transform ml-auto pl-4">
                                                                <ChevronLeft className="w-5 h-5 -rotate-90" />
                                                            </div>
                                                        </summary>
                                                        <div className="px-5 pb-4 pt-1 bg-gray-50/30">
                                                            <div className="overflow-x-auto rounded-lg border border-gray-200 bg-white shadow-sm">
                                                                <table className="min-w-full divide-y divide-gray-200">
                                                                    <thead className="bg-gray-50/80">
                                                                        <tr>
                                                                            <th className="px-5 py-3.5 text-left text-[11px] font-bold text-gray-500 uppercase tracking-widest w-1/4">Personel</th>
                                                                            <th className="px-5 py-3.5 text-left text-[11px] font-bold text-gray-500 uppercase tracking-widest w-24">İlk Giriş</th>
                                                                            <th className="px-5 py-3.5 text-left text-[11px] font-bold text-gray-500 uppercase tracking-widest w-24">Son Çıkış</th>
                                                                            <th className="px-5 py-3.5 text-left text-[11px] font-bold text-gray-500 uppercase tracking-widest">Durumlar</th>
                                                                            <th className="px-5 py-3.5 text-left text-[11px] font-bold text-gray-500 uppercase tracking-widest w-1/3">Notlar</th>
                                                                        </tr>
                                                                    </thead>
                                                                    <tbody className="divide-y divide-gray-100">
                                                                        {groupedByDate[dateKey].map((day, idx) => (
                                                                            <tr key={idx} className={`${getRowStyle(day)} hover:bg-blue-50/30 transition-colors group/row`}>
                                                                                <td className="whitespace-nowrap px-5 py-3.5 text-sm font-semibold text-gray-900">{day.name}</td>
                                                                                <td className="whitespace-nowrap px-5 py-3.5 text-sm text-gray-600 font-mono tracking-tight">{day.entry || '-'}</td>
                                                                                <td className="whitespace-nowrap px-5 py-3.5 text-sm text-gray-600 font-mono tracking-tight">{day.exit || '-'}</td>
                                                                                <td className="px-5 py-3.5 text-sm">
                                                                                    <div className="flex gap-1.5 flex-wrap">
                                                                                        {day.isLate && <span className="inline-flex items-center rounded bg-yellow-100 px-2 py-0.5 text-[11px] font-semibold text-yellow-800 border border-yellow-200">Geç Giriş</span>}
                                                                                        {day.isEarlyExit && <span className="inline-flex items-center rounded bg-orange-100 px-2 py-0.5 text-[11px] font-semibold text-orange-800 border border-orange-200">Erken Çıkış</span>}
                                                                                        {day.isOvertime && <span className="inline-flex items-center rounded bg-purple-100 px-2 py-0.5 text-[11px] font-semibold text-purple-800 border border-purple-200">Mesai</span>}
                                                                                        {day.status === 'Gelmedi' && <span className="inline-flex items-center rounded bg-red-100 px-2 py-0.5 text-[11px] font-semibold text-red-800 border border-red-200">Yok</span>}
                                                                                        {day.isOnLeave && <span className="inline-flex items-center rounded bg-teal-100 px-2 py-0.5 text-[11px] font-semibold text-teal-800 border border-teal-200">İzinli</span>}
                                                                                        {!day.isLate && !day.isEarlyExit && !day.isOvertime && day.status !== 'Gelmedi' && !day.isOnLeave && !day.isHoliday && <span className="inline-flex items-center rounded bg-green-100 px-2 py-0.5 text-[11px] font-semibold text-green-800 border border-green-200">Normal</span>}
                                                                                    </div>
                                                                                </td>
                                                                                <td className="px-5 py-3.5 text-sm text-gray-500 italic group-hover/row:text-gray-700 transition-colors">{day.note}</td>
                                                                            </tr>
                                                                        ))}
                                                                    </tbody>
                                                                </table>
                                                            </div>
                                                        </div>
                                                    </details>
                                                ));
                                            })()}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>

                    {/* Dashboard Modal */}
                    {showDashboard && (
                        <DashboardModal
                            isOpen={showDashboard}
                            onClose={() => setShowDashboard(false)}
                            data={dynamicStats}
                            rules={{
                                morningStart: morningStartStr,
                                morningEnd: morningEndStr,
                                afternoonStart: afternoonStartStr,
                                afternoonEnd: afternoonEndStr,
                                tolerance: toleranceMinutes,
                                standardEnd: standardEndStr
                            }}
                        />
                    )}

                    {/* PDF Modal */}
                    {selectedPdfBlob && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-fade-in">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-5xl h-[90vh] flex flex-col overflow-hidden">
                                <div className="flex items-center justify-between px-6 py-4 border-b border-gray-100 bg-gray-50/50">
                                    <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2">
                                        <FileText className="w-5 h-5 text-blue-500" /> PDF Önizleme
                                    </h3>
                                    <button
                                        onClick={() => setSelectedPdfBlob(null)}
                                        className="p-1.5 hover:bg-red-50 text-gray-400 hover:text-red-500 rounded-lg transition-colors"
                                        title="Kapat"
                                    >
                                        <X className="w-6 h-6" />
                                    </button>
                                </div>
                                <div className="flex-1 overflow-hidden bg-gray-100 p-2">
                                    <iframe src={selectedPdfBlob} className="w-full h-full rounded shadow-sm border border-gray-200 bg-white" title="PDF Önizleme" />
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
