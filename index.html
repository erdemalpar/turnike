<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnike</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <!-- Recharts (Grafikler için - React and ReactDOM must be loaded before Recharts) -->
    <script src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        .drag-active {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }

        /* Animasyonlar */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        .card-selected {
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.5);
            transform: scale(1.02);
            transition: all 0.2s;
        }

        /* Input stili */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- İkon Bileşenleri (SVG) ---

        const Upload = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="17 8 12 3 7 8" /><line x1="12" y1="3" x2="12" y2="15" />
            </svg>
        );

        const FileText = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /><polyline points="10 9 9 9 8 9" />
            </svg>
        );

        const User = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" />
            </svg>
        );

        const Clock = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" />
            </svg>
        );

        const BarChart = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line>
            </svg>
        );

        const AlertCircle = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
        );

        const Calendar = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
        );

        const Briefcase = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
            </svg>
        );

        const ChevronLeft = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="15 18 9 12 15 6"></polyline></svg>
        );
        const ChevronDown = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m6 9 6 6 6-6" /></svg>
        );

        const ChevronRight = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="9 18 15 12 9 6"></polyline></svg>
        );

        const Eye = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0" /><circle cx="12" cy="12" r="3" /></svg>
        );

        const X = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
        );

        const TrendingUp = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
        );

        const Layout = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
        );

        const Activity = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
        );

        const PieChartIcon = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>
        );

        const ClockIcon = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        );

        const Edit = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z" /><path d="m15 5 4 4" /></svg>
        );

        const Trash2 = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /></svg>
        );

        const Users = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        );

        const UserPlus = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><line x1="19" y1="8" x2="19" y2="14" /><line x1="16" y1="11" x2="22" y2="11" /></svg>
        );

        const CalendarPlus = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21 13V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h8" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /><line x1="19" y1="16" x2="19" y2="22" /><line x1="16" y1="19" x2="22" y2="19" /></svg>
        );

        const MapPin = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" /><circle cx="12" cy="10" r="3" /></svg>
        );

        const Search = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>
        );

        // --- Yardımcı Fonksiyonlar ---

        const timeToMinutes = (timeStr) => {
            if (!timeStr) return null;
            const cleanTime = timeStr.replace('.', ':').trim();
            const [hours, minutes] = cleanTime.split(':').map(Number);
            if (isNaN(hours) || isNaN(minutes)) return null;
            return hours * 60 + minutes;
        };

        const minutesToTime = (mins) => {
            if (mins === null || mins === undefined) return "";
            const h = Math.floor(mins / 60).toString().padStart(2, '0');
            const m = (mins % 60).toString().padStart(2, '0');
            return `${h}:${m}`;
        };

        // --- Takvim ---
        const MiniCalendar = ({ selectedDate, onSelectDate, highlightedDates = [], holidays = [] }) => {
            const [currentDate, setCurrentDate] = useState(new Date("2026-03-01T00:00:00"));

            const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
            const firstDayOfMonth = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();

            const monthNames = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
            const dayNames = ["Pt", "Sa", "Ça", "Pe", "Cu", "Ct", "Pz"];
            const firstDayIndex = firstDayOfMonth === 0 ? 6 : firstDayOfMonth - 1;

            const prevMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));
            const nextMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));

            const days = [];
            for (let i = 0; i < firstDayIndex; i++) days.push(null);
            for (let i = 1; i <= daysInMonth; i++) days.push(i);

            return (
                <div className="w-full select-none font-sans mt-2">
                    <div className="flex items-center justify-between mb-4 px-2">
                        <button onClick={prevMonth} className="p-1 hover:bg-gray-100 rounded text-gray-400 hover:text-gray-700 transition"><ChevronLeft className="w-4 h-4" /></button>
                        <span className="font-bold text-[14px] text-gray-700">{monthNames[currentDate.getMonth()]} {currentDate.getFullYear()}</span>
                        <button onClick={nextMonth} className="p-1 hover:bg-gray-100 rounded text-gray-400 hover:text-gray-700 transition"><ChevronRight className="w-4 h-4" /></button>
                    </div>
                    <div className="grid grid-cols-7 gap-1 text-center mb-2">
                        {dayNames.map(d => <span key={d} className="text-xs font-bold text-gray-400">{d}</span>)}
                    </div>
                    <div className="grid grid-cols-7 gap-y-1 gap-x-1 text-center text-[13px] text-gray-500 font-medium">
                        {days.map((d, i) => {
                            if (!d) return <div key={i} className="h-7 w-7 mx-auto"></div>;
                            const dayStr = String(d).padStart(2, '0');
                            const monthStr = String(currentDate.getMonth() + 1).padStart(2, '0');
                            const yearStr = currentDate.getFullYear();
                            const fullDateStr = `${dayStr}.${monthStr}.${yearStr}`;

                            const isSelected = selectedDate === fullDateStr;
                            const isHighlighted = highlightedDates.includes(fullDateStr);
                            const specialDay = Array.isArray(holidays) && holidays.find(h => {
                                if (!h || !h.date) return false;
                                const [y, m, d_api] = h.date.split('-');
                                return `${d_api}.${m}.${y}` === fullDateStr;
                            });

                            const isMarkedDay = !!specialDay;
                            const isActualHoliday = specialDay && specialDay.isHoliday;

                            return (
                                <div
                                    key={i}
                                    onClick={() => onSelectDate(isSelected ? null : fullDateStr)}
                                    className={`relative h-7 w-7 mx-auto flex items-center justify-center rounded-full cursor-pointer transition-colors ${isSelected ? 'bg-blue-600 text-white font-bold shadow-md' : 'hover:bg-gray-100 text-gray-600'}`}
                                >
                                    {d}
                                    {isHighlighted && !isSelected && (
                                        <div className="absolute bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 bg-blue-500 rounded-full"></div>
                                    )}
                                    {isMarkedDay && !isSelected && (
                                        <div
                                            className={`absolute top-0 right-0 w-1.5 h-1.5 rounded-full ${isActualHoliday ? 'bg-red-500' : 'bg-blue-400'}`}
                                            title={specialDay.name}
                                        ></div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // --- Dashboard Modal Bileşeni ---
        const DashboardModal = ({ isOpen, onClose, data, rules }) => {
            if (!isOpen || !data) return null;

            // Recharts CDN Global Güvenliği (Farklı isimlendirme olasılıkları için)
            const RechartsLib = window.Recharts || Recharts;

            if (!RechartsLib) {
                console.error("Recharts kütüphanesi bulunamadı! window.Recharts:", window.Recharts);
                return (
                    <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm">
                        <div className="bg-white p-8 rounded-2xl shadow-xl">
                            <h2 className="text-xl font-bold text-red-600">Hata</h2>
                            <p className="text-gray-600 mt-2">Grafik kütüphanesi (Recharts) yüklenemedi. Lütfen internet bağlantınızı kontrol edin.</p>
                            <button onClick={onClose} className="mt-4 px-6 py-2 bg-gray-800 text-white rounded-lg">Kapat</button>
                        </div>
                    </div>
                );
            }

            const {
                ResponsiveContainer, BarChart: RBarChart, Bar, XAxis, YAxis, CartesianGrid,
                Tooltip, Legend, LineChart: RLineChart, Line, PieChart: RPieChart, Pie, Cell,
                AreaChart, Area
            } = RechartsLib;

            // Veri İşleme (Grafikler için) - Defansif Yaklaşım
            const details = Array.isArray(data.details) ? data.details : [];

            // 1. Hedef vs Gerçekleşen (Günlük Ortalama)
            const workHoursMap = {};
            details.forEach(curr => {
                if (!curr || curr.isHoliday || curr.isOnLeave || curr.status === 'Gelmedi' || !curr.date) return;

                const date = curr.date;
                if (!workHoursMap[date]) {
                    workHoursMap[date] = { date, gercek: 0, hedef: 8.5 };
                }

                if (curr.entry && curr.exit && typeof curr.entry === 'string' && typeof curr.exit === 'string') {
                    const eParts = curr.entry.split(':');
                    const xParts = curr.exit.split(':');
                    if (eParts.length >= 2 && xParts.length >= 2) {
                        const eh = parseInt(eParts[0]);
                        const em = parseInt(eParts[1]);
                        const xh = parseInt(xParts[0]);
                        const xm = parseInt(xParts[1]);

                        if (!isNaN(eh) && !isNaN(xh)) {
                            const diff = (xh * 60 + (xm || 0)) - (eh * 60 + (em || 0));
                            workHoursMap[date].gercek += Math.max(0, diff / 60);
                        }
                    }
                }
            });

            const barChartData = Object.values(workHoursMap)
                .sort((a, b) => {
                    const [d1, m1, y1] = a.date.split('.').map(Number);
                    const [d2, m2, y2] = b.date.split('.').map(Number);
                    return new Date(y1, m1 - 1, d1) - new Date(y2, m2 - 1, d2);
                })
                .slice(-10);

            // 2. Performans Skoru Trendi
            const performanceData = barChartData.map(d => ({
                name: d.date,
                skor: Math.min(100, Math.round((d.gercek / d.hedef) * 100))
            }));

            // 3. Geç Kalma / Erken Çıkış Dağılımı
            const lateCount = details.filter(d => d && d.isLate).length;
            const earlyCount = details.filter(d => d && d.isEarlyExit).length;
            const promptCount = details.filter(d => d && d.status === 'Geldi' && !d.isLate && !d.isEarlyExit).length;

            const pieData = [
                { name: 'Zamanında', value: promptCount, color: '#10b981' },
                { name: 'Geç Giriş', value: lateCount, color: '#f59e0b' },
                { name: 'Erken Çıkış', value: earlyCount, color: '#ef4444' }
            ].filter(d => d.value > 0);

            // 4. Fazla Mesai Analizi (Personel Bazlı)
            const overtimeByPerson = {};
            details.forEach(curr => {
                if (curr && curr.isOvertime && curr.name) {
                    overtimeByPerson[curr.name] = (overtimeByPerson[curr.name] || 0) + 1;
                }
            });
            const overtimeChartData = Object.entries(overtimeByPerson)
                .map(([name, count]) => ({ name, count }))
                .sort((a, b) => b.count - a.count)
                .slice(0, 5);

            // 5. Turnike Yoğunluk Analizi (Saat Bazlı)
            const hourIntensity = new Array(24).fill(0).map((_, i) => ({ saat: `${i}:00`, giris: 0, cikis: 0 }));
            details.forEach(d => {
                if (!d) return;
                if (d.entry && typeof d.entry === 'string') {
                    const h = parseInt(d.entry.split(':')[0]);
                    if (!isNaN(h) && h >= 0 && h < 24) hourIntensity[h].giris++;
                }
                if (d.exit && typeof d.exit === 'string') {
                    const h = parseInt(d.exit.split(':')[0]);
                    if (!isNaN(h) && h >= 0 && h < 24) hourIntensity[h].cikis++;
                }
            });
            const heatmapData = hourIntensity.filter(d => d.giris > 0 || d.cikis > 0);

            // 6. Anomali Listesi
            const anomalies = details.filter(d => {
                if (!d) return false;
                const note = d.note || "";
                return note.includes("ÇIKIŞ YOK") || note.includes("GİRİŞ YOK") || (d.isWeekend && d.status === 'Geldi');
            }).slice(0, 10);

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-7xl max-h-[90vh] flex flex-col overflow-hidden border border-gray-100 animate-slide-up">
                        {/* Header */}
                        <div className="px-8 py-5 border-b border-gray-100 flex items-center justify-between bg-white sticky top-0 z-10">
                            <div className="flex items-center gap-3">
                                <div className="p-2.5 bg-blue-600 rounded-xl shadow-lg shadow-blue-200">
                                    <TrendingUp className="w-6 h-6 text-white" />
                                </div>
                                <div>
                                    <h2 className="text-xl font-bold text-gray-800 tracking-tight">Analiz ve Gösterge Paneli</h2>
                                    <p className="text-xs text-gray-500 font-medium mt-0.5 uppercase tracking-wider">Yönetici Stratejik Veri Görselleştirme</p>
                                </div>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-gray-100 rounded-full transition-colors group">
                                <X className="w-6 h-6 text-gray-400 group-hover:text-gray-600" />
                            </button>
                        </div>

                        {/* Content */}
                        <div className="flex-1 overflow-y-auto p-8 bg-gray-50/50 custom-scrollbar">

                                        <Activity className="w-5 h-5 text-emerald-500" />
                                        <h3 className="font-bold text-gray-700">Verimlilik Trendi (%)</h3>
                                    </div>

                                        <ResponsiveContainer width="100%" height="100%">

                                                <XAxis dataKey="name" fontSize={10} tick={{ fill: '#64748b' }} axisLine={false} tickLine={false} />
                                                <YAxis fontSize={10} tick={{ fill: '#64748b' }} axisLine={false} tickLine={false} domain={[0, 100]} />
                                                <Tooltip />
                                                <Line type="monotone" dataKey="skor" stroke="#10b981" strokeWidth={3} dot={{ r: 4, fill: '#10b981' }} activeDot={{ r: 6 }} name="Verimlilik Skoru" />
                                            </RLineChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                    <div className="flex items-center gap-2 mb-6 border-b border-gray-50 pb-3">
                                        <PieChartIcon className="w-5 h-5 text-amber-500" />
                                        <h3 className="font-bold text-gray-700">Mesai Uyumu Analizi</h3>
                                    </div>
                                    <div className="h-[250px] w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <RPieChart>
                                                <Pie data={pieData} innerRadius={60} outerRadius={80} paddingAngle={5} dataKey="value">
                                                    {pieData.map((entry, index) => (
                                                        <Cell key={`cell-${index}`} fill={entry.color || '#cbd5e1'} />
                                                    ))}
                                                </Pie>
                                                <Tooltip />
                                                <Legend align="right" verticalAlign="middle" layout="vertical" iconType="circle" />
                                            </RPieChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                    <div className="flex items-center gap-2 mb-6 border-b border-gray-50 pb-3">
                                        <ClockIcon className="w-5 h-5 text-purple-500" />
                                        <h3 className="font-bold text-gray-700">Fazla Mesai (Kişi Bazlı)</h3>
                                    </div>
                                    <div className="h-[250px] w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <RBarChart layout="vertical" data={overtimeChartData}>
                                                <CartesianGrid strokeDasharray="3 3" horizontal={false} stroke="#f1f5f9" />
                                                <XAxis type="number" fontSize={10} hide />
                                                <YAxis type="category" dataKey="name" fontSize={9} width={80} axisLine={false} tickLine={false} />
                                                <Tooltip />
                                                <Bar dataKey="count" fill="#8b5cf6" radius={[0, 4, 4, 0]} barSize={15} name="Gün Sayısı" />
                                            </RBarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>

                                {/* 5. Turnike Giriş/Çıkış Yoğunluğu */}
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 lg:col-span-2">
                                    <div className="flex items-center gap-2 mb-6 border-b border-gray-50 pb-3">
                                        <Layout className="w-5 h-5 text-indigo-500" />
                                        <h3 className="font-bold text-gray-700">Turnike Kullanım Yoğunluğu (Saatlik)</h3>
                                    </div>
                                    <div className="h-[250px] w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <AreaChart data={heatmapData}>
                                                <defs>
                                                    <linearGradient id="colorGiris" x1="0" y1="0" x2="0" y2="1">
                                                        <stop offset="5%" stopColor="#6366f1" stopOpacity={0.1} />
                                                        <stop offset="95%" stopColor="#6366f1" stopOpacity={0} />
                                                    </linearGradient>
                                                </defs>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                <XAxis dataKey="saat" fontSize={10} axisLine={false} tickLine={false} />
                                                <YAxis fontSize={10} axisLine={false} tickLine={false} />
                                                <Tooltip />
                                                <Area type="monotone" dataKey="giris" stroke="#6366f1" fillOpacity={1} fill="url(#colorGiris)" name="Girişler" strokeWidth={2} />
                                                <Area type="monotone" dataKey="cikis" stroke="#f43f5e" fillOpacity={0} name="Çıkışlar" strokeWidth={2} strokeDasharray="5 5" />
                                            </AreaChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>

                                {/* 6. Anomali ve İhlal Listesi */}
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 lg:col-span-3">
                                    <div className="flex items-center gap-2 mb-6 border-b border-gray-50 pb-3">
                                        <AlertCircle className="w-5 h-5 text-rose-500" />
                                        <h3 className="font-bold text-gray-700">Sistem Anomali ve İhlal Takip Listesi</h3>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-sm border-separate border-spacing-y-2">
                                            <thead>
                                                <tr className="text-gray-400 font-bold uppercase text-[10px] tracking-widest">
                                                    <th className="px-4 py-2 font-bold">Tarih</th>
                                                    <th className="px-4 py-2 font-bold">Personel</th>
                                                    <th className="px-4 py-2 font-bold">Tür</th>
                                                    <th className="px-4 py-2 font-bold">Detay</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {anomalies.length > 0 ? anomalies.map((a, i) => (
                                                    <tr key={i} className="bg-gray-50/50 hover:bg-gray-50 transition-colors">
                                                        <td className="px-4 py-3 font-semibold text-gray-600 rounded-l-xl">{a.date}</td>
                                                        <td className="px-4 py-3 font-bold text-gray-800">{a.name}</td>
                                                        <td className="px-4 py-3">
                                                            <span className={`px-2 py-1 rounded-md text-[10px] font-bold uppercase ${a.isWeekend ? 'bg-purple-100 text-purple-700' : 'bg-red-100 text-red-700'}`}>
                                                                {a.isWeekend ? 'Haftasonu Giriş' : 'Eksik İşlem'}
                                                            </span>
                                                        </td>
                                                        <td className="px-4 py-3 text-gray-500 font-medium rounded-r-xl italic">{a.note}</td>
                                                    </tr>
                                                )) : (
                                                    <tr>
                                                        <td colSpan="4" className="text-center py-8 text-gray-400 font-medium">Herhangi bir anomali tespit edilmedi.</td>

                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Footer */}
                        <div className="px-8 py-4 border-t border-gray-100 bg-white flex justify-end">
                            <button onClick={onClose} className="px-6 py-2 bg-gray-800 text-white rounded-xl font-bold hover:bg-gray-900 transition-all shadow-lg hover:shadow-xl active:scale-95">Kapat</button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Personel Yönetimi Modal Bileşeni ---
        const PersonnelManagementModal = ({ isOpen, onClose, personnelList, setPersonnelList }) => {
            const [searchTerm, setSearchTerm] = useState("");
            const [selectedPName, setSelectedPName] = useState(null);
            const [activeTab, setActiveTab] = useState("PROFILE"); // PROFILE, LEAVES, ASSIGNMENTS
            const [showAddForm, setShowAddForm] = useState(false);
            const [openDepts, setOpenDepts] = useState({}); // Akordiyon durumları

            // Form States
            const [leaveStart, setLeaveStart] = useState("");
            const [leaveEnd, setLeaveEnd] = useState("");
            const [assignStart, setAssignStart] = useState("");
            const [assignEnd, setAssignEnd] = useState("");
            const [assignPlace, setAssignPlace] = useState("");

            const uniqueDepartments = [...new Set(personnelList.map(p => p.department))].sort();

            // Arama yapıldığında ilgili departmanları otomatik aç
            useEffect(() => {
                if (searchTerm.trim().length > 0) {
                    const deptsToOpen = {};
                    const searchUpper = searchTerm.toLocaleUpperCase('tr-TR');
                    personnelList.forEach(p => {
                        if (p.name.toLocaleUpperCase('tr-TR').includes(searchUpper)) {
                            deptsToOpen[p.department] = true;
                        }
                    });
                    setOpenDepts(prev => ({ ...prev, ...deptsToOpen }));
                }
            }, [searchTerm]);

            const selectedP = personnelList.find(p => p.name === selectedPName);

            const handleAddLeave = () => {
                if (!leaveStart) return;
                setPersonnelList(prev => prev.map(p => {
                    if (p.name === selectedPName) {
                        return { ...p, leaves: [...(p.leaves || []), { start: leaveStart, end: leaveEnd || leaveStart }] };
                    }
                    return p;
                }));
                setLeaveStart(""); setLeaveEnd("");
            };

            const handleAddAssign = () => {
                if (!assignStart || !assignPlace) return;
                setPersonnelList(prev => prev.map(p => {
                    if (p.name === selectedPName) {
                        return { ...p, assignments: [...(p.assignments || []), { start: assignStart, end: assignEnd || assignStart, place: assignPlace }] };
                    }
                    return p;
                }));
                setAssignStart(""); setAssignEnd(""); setAssignPlace("");
            };

            const updateProfile = (field, value) => {
                setPersonnelList(prev => prev.map(p => {
                    if (p.name === selectedPName) {
                        return { ...p, [field]: value };
                    }
                    return p;
                }));
            };

            const toggleDept = (dept) => {
                setOpenDepts(prev => ({ ...prev, [dept]: !prev[dept] }));
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-[110] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm animate-in fade-in duration-300 p-4">
                    <div className="bg-white w-full max-w-5xl h-[85vh] rounded-3xl shadow-2xl flex overflow-hidden border border-white/20 animate-in zoom-in-95 duration-300">
                        {/* Sol Panel: Liste (Akordiyon Gruplu) */}
                        <div className="w-1/3 border-r border-slate-100 flex flex-col bg-slate-50/50 min-w-[320px]">
                            <div className="p-6 space-y-4">
                                <div className="flex items-center justify-between">
                                    <h2 className="text-xl font-black text-slate-800 tracking-tight">Personel Listesi</h2>
                                    <button onClick={() => { setSelectedPName(null); setShowAddForm(true); }} className="p-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition-all shadow-lg active:scale-95">
                                        <UserPlus className="w-5 h-5" />
                                    </button>
                                </div>
                                <div className="relative group">
                                    <Search className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 group-focus-within:text-blue-500 transition-colors" />
                                    <input
                                        type="text"
                                        placeholder="İsim ile ara..."
                                        value={searchTerm}
                                        onChange={e => setSearchTerm(e.target.value)}
                                        className="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all shadow-sm"
                                    />
                                </div>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto px-4 pb-6 space-y-3 custom-scrollbar">
                                {uniqueDepartments.map(dept => {
                                    const deptPersonnel = personnelList
                                        .filter(p => p.department === dept)
                                        .filter(p => !searchTerm || p.name.toLocaleUpperCase('tr-TR').includes(searchTerm.toLocaleUpperCase('tr-TR')))
                                        .sort((a, b) => a.name.localeCompare(b.name, 'tr-TR'));

                                    if (deptPersonnel.length === 0 && searchTerm) return null;

                                    const isOpenDept = !!openDepts[dept];

                                    return (
                                        <div key={dept} className="bg-white/40 rounded-2xl border border-slate-100 overflow-hidden shadow-sm">
                                            <button 
                                                onClick={() => toggleDept(dept)}
                                                className={`w-full p-4 flex items-center justify-between transition-colors ${isOpenDept ? 'bg-slate-100/50' : 'hover:bg-white'}`}
                                            >
                                                <div className="flex items-center gap-3">
                                                    <div className={`w-2 h-2 rounded-full ${deptPersonnel.length > 0 ? 'bg-blue-500' : 'bg-slate-300'}`}></div>
                                                    <span className="text-xs font-black text-slate-700 uppercase tracking-wider text-left">{dept}</span>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <span className="text-[10px] font-bold text-slate-400 px-2 py-0.5 bg-white rounded-lg border border-slate-100">{deptPersonnel.length}</span>
                                                    <ChevronDown className={`w-4 h-4 text-slate-400 transition-transform duration-300 ${isOpenDept ? 'rotate-180' : ''}`} />
                                                </div>
                                            </button>
                                            
                                            {isOpenDept && (
                                                <div className="p-2 space-y-1 bg-white/60 animate-in slide-in-from-top-1 duration-200 border-t border-slate-100">
                                                    {deptPersonnel.map(p => (
                                                        <div
                                                            key={p.name}
                                                            onClick={() => { setSelectedPName(p.name); setShowAddForm(false); }}
                                                            className={`p-3 rounded-xl cursor-pointer transition-all flex items-center justify-between group ${selectedPName === p.name ? 'bg-blue-600 shadow-lg shadow-blue-600/20 translate-x-1' : 'hover:bg-slate-50'}`}
                                                        >
                                                            <div className="flex flex-col min-w-0">
                                                                <span className={`text-[13px] font-bold truncate ${selectedPName === p.name ? 'text-white' : 'text-slate-700'}`}>{p.name}</span>
                                                            </div>
                                                            <ChevronRight className={`w-3.5 h-3.5 transition-transform ${selectedPName === p.name ? 'text-white translate-x-0.5' : 'text-slate-300 opacity-0 group-hover:opacity-100 group-hover:text-blue-500'}`} />
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* Sağ Panel: Detay/Form */}
                        <div className="flex-1 flex flex-col bg-white overflow-hidden relative">
                            <button onClick={onClose} className="absolute top-6 right-6 p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-xl transition-all z-10">
                                <X className="w-6 h-6" />
                            </button>

                            {showAddForm ? (
                                <div className="p-8 h-full flex flex-col justify-center max-w-lg mx-auto w-full space-y-8 animate-in slide-in-from-right-4 duration-300">
                                    <div className="space-y-2 text-center">
                                        <h3 className="text-3xl font-black text-slate-800">Yeni Personel Kaydı</h3>
                                        <p className="text-slate-500 font-medium italic">Sisteme yeni bir personel tanımlayın.</p>
                                    </div>
                                    <div className="space-y-4">
                                        <div className="space-y-1.5">
                                            <label className="text-xs font-bold text-slate-500 ml-1">AD SOYAD</label>
                                            <input id="new_p_name" type="text" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 focus:bg-white transition-all font-semibold" placeholder="Örn: AHMET YILMAZ" />
                                        </div>
                                        <div className="space-y-1.5">
                                            <label className="text-xs font-bold text-slate-500 ml-1">ŞUBE MÜDÜRLÜĞÜ</label>
                                            <select id="new_p_dept" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 focus:bg-white transition-all font-semibold appearance-none">
                                                {uniqueDepartments.map(d => <option key={d}>{d}</option>)}
                                            </select>
                                        </div>
                                        <button 
                                            onClick={() => {
                                                const nameValue = document.getElementById('new_p_name').value.toLocaleUpperCase('tr-TR').trim();
                                                const deptValue = document.getElementById('new_p_dept').value;
                                                if(nameValue && !personnelList.find(x => x.name === nameValue)) {
                                                    const newP = { name: nameValue, department: deptValue, isActive: true, leaves: [], assignments: [] };
                                                    setPersonnelList([...personnelList, newP]);
                                                    setSelectedPName(nameValue); setShowAddForm(false);
                                                    setOpenDepts(prev => ({ ...prev, [deptValue]: true }));
                                                }
                                            }}
                                            className="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-xl shadow-blue-600/20 hover:bg-blue-700 active:scale-95 transition-all text-lg"
                                        >
                                            PERSONELİ SİSTEME EKLE
                                        </button>
                                    </div>
                                </div>
                            ) : selectedP ? (
                                <div className="flex flex-col h-full animate-in fade-in duration-300">
                                    {/* Detay Header */}
                                    <div className="p-8 pb-4 border-b border-slate-100 flex items-center justify-between bg-slate-50/30">
                                        <div className="flex items-center gap-5">
                                            <div className="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center text-blue-600 shadow-inner">
                                                <Users className="w-8 h-8" />
                                            </div>
                                            <div>
                                                <h3 className="text-2xl font-black text-slate-800 tracking-tight">{selectedP.name}</h3>
                                                <p className="text-slate-500 font-bold text-xs uppercase tracking-widest mt-1">{selectedP.department}</p>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Sekmeler */}
                                    <div className="flex px-8 border-b border-slate-100 bg-slate-50/30">
                                        {[
                                            { id: "PROFILE", label: "Profil Bilgileri", icon: Users },
                                            { id: "LEAVES", label: "İzin / Rapor", icon: CalendarPlus },
                                            { id: "ASSIGNMENTS", label: "Dış Görev", icon: MapPin }
                                        ].map(t => (
                                            <button
                                                key={t.id}
                                                onClick={() => setActiveTab(t.id)}
                                                className={`flex items-center gap-2 px-6 py-4 text-xs font-black uppercase tracking-widest transition-all border-b-2 ${activeTab === t.id ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-400 hover:text-slate-600'}`}
                                            >
                                                <t.icon className="w-4 h-4" />
                                                {t.label}
                                            </button>
                                        ))}
                                    </div>

                                    <div className="flex-1 overflow-y-auto p-8 custom-scrollbar">
                                        {activeTab === "PROFILE" && (
                                            <div className="max-w-md space-y-6 animate-in slide-in-from-bottom-4">
                                                <div className="space-y-4 bg-slate-50 p-6 rounded-3xl border border-slate-100 shadow-sm">
                                                    <div className="space-y-1.5">
                                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Ad Soyad Düzenle</label>
                                                        <input 
                                                            type="text" 
                                                            value={selectedP.name}
                                                            onChange={e => updateProfile("name", e.target.value.toLocaleUpperCase('tr-TR'))}
                                                            className="w-full p-3 bg-white border border-slate-200 rounded-xl outline-none focus:border-blue-500 font-bold text-slate-700 shadow-sm"
                                                        />
                                                    </div>
                                                    <div className="space-y-1.5">
                                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Şube Müdürlüğü</label>
                                                        <select 
                                                            value={selectedP.department}
                                                            onChange={e => updateProfile("department", e.target.value)}
                                                            className="w-full p-3 bg-white border border-slate-200 rounded-xl outline-none focus:border-blue-500 font-bold text-slate-700 appearance-none shadow-sm"
                                                        >
                                                            {uniqueDepartments.map(d => <option key={d}>{d}</option>)}
                                                        </select>
                                                    </div>
                                                    <div className="pt-4 border-t border-slate-200 mt-4 flex items-center justify-between">
                                                        <span className="text-xs font-bold text-slate-500">Personel Durumu:</span>
                                                        <button 
                                                            onClick={() => updateProfile("isActive", !selectedP.isActive)}
                                                            className={`px-4 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${selectedP.isActive ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}`}
                                                        >
                                                            {selectedP.isActive ? 'Aktif' : 'Pasif'}
                                                        </button>
                                                    </div>
                                                </div>
                                                <button 
                                                    onClick={() => {
                                                        if(confirm(`${selectedP.name} isimli personeli silmek istediğinize emin misiniz?`)) {
                                                            setPersonnelList(prev => prev.filter(x => x.name !== selectedP.name));
                                                            setSelectedPName(null);
                                                        }
                                                    }}
                                                    className="w-full py-4 bg-red-50 text-red-600 rounded-2xl text-xs font-bold hover:bg-red-100 transition-colors uppercase tracking-widest flex items-center justify-center gap-2 border border-red-100"
                                                >
                                                    <Trash2 className="w-4 h-4" />
                                                    PERSONELİ SİSTEMDEN SİL
                                                </button>
                                            </div>
                                        )}

                                        {activeTab === "LEAVES" && (
                                            <div className="space-y-8 animate-in slide-in-from-bottom-4">
                                                <div className="bg-orange-50/50 p-6 rounded-3xl border border-orange-100 space-y-4 shadow-sm">
                                                    <h4 className="text-sm font-black text-orange-800 flex items-center gap-2">
                                                        <CalendarPlus className="w-5 h-5" />
                                                        Yeni İzin / Rapor Dönemi Tanımla
                                                    </h4>
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <div className="space-y-1.5">
                                                            <label className="text-[10px] font-bold text-orange-600/70 ml-1">BAŞLANGIÇ</label>
                                                            <input type="date" value={leaveStart} onChange={e => setLeaveStart(e.target.value)} className="w-full p-3 rounded-xl border border-orange-200 outline-none focus:ring-4 focus:ring-orange-500/10 font-medium" />
                                                        </div>

                                        {activeTab === "ASSIGNMENTS" && (

                                                        <MapPin className="w-5 h-5" />

                                                            <input type="text" value={assignPlace} onChange={e => setAssignPlace(e.target.value)} className="w-full p-3 rounded-xl border border-indigo-200 outline-none focus:ring-4 focus:ring-indigo-500/10 font-bold text-sm" placeholder="Örn: TSE Denetimi / Ankara" />

                                                </div>

                                                <div className="space-y-3">
                                                    <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Kayıtlı Görev Geçmişi</h4>
                                                    {selectedP.assignments?.length > 0 ? (
                                                        <div className="grid gap-2">
                                                            {selectedP.assignments.map((a, idx) => (
                                                                <div key={idx} className="flex items-center justify-between p-4 bg-white border border-slate-100 rounded-2xl hover:shadow-md transition-all group">

                                                                            </span>

                                                                    <button onClick={() => setPersonnelList(prev => prev.map(p => p.name === selectedPName ? { ...p, assignments: p.assignments.filter((_, i) => i !== idx) } : p))} className="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all p-2 bg-slate-50 rounded-lg">

                                            </div>
                                        )}
                                    </div>
                                </div>
                            ) : (
                                <div className="flex-1 flex flex-col items-center justify-center text-slate-300 space-y-6 animate-in fade-in zoom-in-95">
                                    <div className="w-32 h-32 bg-slate-50 rounded-full flex items-center justify-center border-2 border-dashed border-slate-200">
                                        <Users className="w-16 h-16 text-slate-200" />
                                    </div>
                                    <div className="text-center">
                                        <p className="text-xl font-black text-slate-400 tracking-tight">Personel Seçimi Yapılmadı</p>
                                        <p className="text-[10px] font-bold text-slate-300 uppercase tracking-[0.2em] mt-2">Detayları görmek için soldaki listeden seçim yapın</p>
