                        </div>
                    </div>
                </div>
            );
        };

        // --- Ana Uygulama ---

        const parseTime = (str) => {
            if (!str) return 0;
            // Hem ':' hem '.' ayraçlarını destekle
            const parts = str.includes(':') ? str.split(':') : str.split('.');
            const [h, m] = parts.map(Number);
            return (h * 60) + (m || 0);
        };

        const App = () => {
            const [files, setFiles] = useState([]);
            const [parsedRows, setParsedRows] = useState([]);
            const [holidays, setHolidays] = useState([]); // Türkiye Resmi Tatilleri
            const [currentDate, setCurrentDate] = useState(new Date(2026, 2, 1)); // Varsayılan Mart 2026
            const [isPersonnelManagementOpen, setIsPersonnelManagementOpen] = useState(false);
            // Dinamik Tatil ve Özel Gün Üreticisi
            useEffect(() => {
                const fetchHolidays = async () => {
                    const year = currentDate.getFullYear();

                    // 1. Sabit Özel Günler (Her yıl aynı tarihtedir)
                    const fixedSpecialDays = [
                        { date: `${year}-01-01`, name: 'Yılbaşı', isHoliday: true },
                        { date: `${year}-03-18`, name: 'Çanakkale Zaferi', isHoliday: false },
                        { date: `${year}-04-23`, name: '23 Nisan Çocuk Bayramı', isHoliday: true },
                        { date: `${year}-05-01`, name: '1 Mayıs İşçi Bayramı', isHoliday: true },
                        { date: `${year}-05-19`, name: '19 Mayıs Gençlik ve Spor Bayramı', isHoliday: true },
                        { date: `${year}-07-15`, name: '15 Temmuz Demokrasi Bayramı', isHoliday: true },
                        { date: `${year}-08-30`, name: '30 Ağustos Zafer Bayramı', isHoliday: true },
                        { date: `${year}-10-29`, name: '29 Ekim Cumhuriyet Bayramı', isHoliday: true },
                        { date: `${year}-11-10`, name: '10 Kasım Atatürk\'ü Anma', isHoliday: false }
                    ];

                    // 2. Dini Bayram Haritası (API verisindeki eksiklikler için manuel güvenilir kaynak)
                    const RELIGIOUS_HOLIDAYS_MAP = {
                        2026: { ramadan: '2026-03-20', qurban: '2026-05-27' },
                        2027: { ramadan: '2027-03-10', qurban: '2027-05-17' },
                        2028: { ramadan: '2028-02-27', qurban: '2028-05-05' },
                        2029: { ramadan: '2029-02-15', qurban: '2029-04-24' },
                        2030: { ramadan: '2030-02-05', qurban: '2030-04-14' }
                    };

                    const dynamicHolidays = [];
                    const yearInfo = RELIGIOUS_HOLIDAYS_MAP[year];

                    const formatDate = (date) => {
                        const y = date.getFullYear();
                        const m = String(date.getMonth() + 1).padStart(2, '0');
                        const day = String(date.getDate()).padStart(2, '0');
                        return `${y}-${m}-${day}`;
                    };

                    if (yearInfo) {
                        // Ramazan Bayramı Üretimi (Arife + 3 Gün)
                        const ramadanBase = new Date(yearInfo.ramadan + 'T00:00:00');
                        for (let i = -1; i <= 2; i++) {
                            const d = new Date(ramadanBase);
                            d.setDate(d.getDate() + i);
                            const dateStr = formatDate(d);
                            const label = i === -1 ? 'Ramazan Bayramı Arifesi' : (i === 0 ? 'Ramazan Bayramı 1. Gün' : `Ramazan Bayramı ${i+1}. Gün`);
                            dynamicHolidays.push({ date: dateStr, name: label, isHoliday: true });
                        }

                        // Kurban Bayramı Üretimi (Arife + 4 Gün)
                        const qurbanBase = new Date(yearInfo.qurban + 'T00:00:00');
                        for (let i = -1; i <= 3; i++) {
                            const d = new Date(qurbanBase);
                            d.setDate(d.getDate() + i);
                            const dateStr = formatDate(d);
                            const label = i === -1 ? 'Kurban Bayramı Arifesi' : (i === 0 ? 'Kurban Bayramı 1. Gün' : `Kurban Bayramı ${i+1}. Gün`);
                            dynamicHolidays.push({ date: dateStr, name: label, isHoliday: true });
                        }
                    }

                    try {
                        const response = await fetch(`https://date.nager.at/api/v3/PublicHolidays/${year}/TR`);
                        if (response.ok) {
                            const apiData = await response.json();
                            apiData.forEach(h => {
                                // Sadece henüz eklenmemiş olan (zaten sabit listemizde veya bayramlarda olmayan) tatilleri ekle
                                if (!fixedSpecialDays.find(fs => fs.date === h.date) &&
                                    !dynamicHolidays.find(dh => dh.date === h.date)) {
                                    dynamicHolidays.push({ date: h.date, name: h.localName, isHoliday: true });
                                }
                            });
                        }
                    } catch (err) {
                        console.error("Tatil API hatası (Sabitler ve Dinamikler kullanılacak):", err);
                    }

                    // Tüm listeyi birleştir
                    const finalHolidays = [...fixedSpecialDays];
                    dynamicHolidays.forEach(dh => {
                        if (!finalHolidays.find(f => f.date === dh.date)) {
                            finalHolidays.push(dh);
                        }
                    });

                    // Koleksiyonu state'e aktar
                    setHolidays(finalHolidays);
                };
                fetchHolidays();
            }, [currentDate.getFullYear()]);

            const [personnelList, setPersonnelList] = useState([]);
            const [dataLoaded, setDataLoaded] = useState(false);

            // Verileri Yükle (JSON -> LocalStorage -> State)
            useEffect(() => {
                const savedData = localStorage.getItem('turnike_personnel_data');
                if (savedData) {
                    try {
                        setPersonnelList(JSON.parse(savedData));
                    } catch (e) {
                        console.error("LocalStorage verisi bozuk, JSON'a dönülüyor.");
                        localStorage.removeItem('turnike_personnel_data');
                    }
                    setDataLoaded(true);
                } else {
                    fetch('personelyonetim.json')
                        .then(res => res.json())
                        .then(data => {
                            setPersonnelList(data);
                            localStorage.setItem('turnike_personnel_data', JSON.stringify(data));
                            setDataLoaded(true);
                        })
                        .catch(err => {
                            console.error("Personel verisi yüklenemedi:", err);
                            setDataLoaded(true);
                        });
                }
            }, []);

            // Her değişiklikte LocalStorage'a kaydet
            useEffect(() => {
                if (dataLoaded) {
                    localStorage.setItem('turnike_personnel_data', JSON.stringify(personnelList));
                }
            }, [personnelList, dataLoaded]);

            const [newPersonnelName, setNewPersonnelName] = useState("");
            const [newPersonnelDept, setNewPersonnelDept] = useState("CBS Şube Müdürlüğü");
            const [openDepts, setOpenDepts] = useState({}); // Akordiyon durumları
            const [selectedPersonnel, setSelectedPersonnel] = useState("TÜMÜ");
            const [globalSearch, setGlobalSearch] = useState("");

            useEffect(() => {
                if (globalSearch.trim().length > 1) {
                    const deptsToOpen = {};
                    const searchUpper = globalSearch.toLocaleUpperCase('tr-TR');
                    personnelList.forEach(p => {
                        if (p.name.includes(searchUpper)) {
                            deptsToOpen[p.department] = true;
                        }
                    });
                    setOpenDepts(prev => ({ ...prev, ...deptsToOpen }));
                }
            }, [globalSearch]);

            const [isProcessing, setIsProcessing] = useState(false);
            const [stats, setStats] = useState(null);
            const [error, setError] = useState(null);
            const [activeFilter, setActiveFilter] = useState('ALL');
            const [toleranceEnabled, setToleranceEnabled] = useState(true);
            const [toleranceMinutes, setToleranceMinutes] = useState(30);

            const [morningStartStr, setMorningStartStr] = useState("09:00");
            const [morningEndStr, setMorningEndStr] = useState("12:30");
            const [afternoonStartStr, setAfternoonStartStr] = useState("13:30");
            const [afternoonEndStr, setAfternoonEndStr] = useState("18:00");
            const [standardEndStr, setStandardEndStr] = useState("18:30");
            const [selectedPdfBlob, setSelectedPdfBlob] = useState(null);
            const [selectedCalendarDate, setSelectedCalendarDate] = useState(null);

            // Yardımcı: Tarih formatı dönüşümü (DD.MM.YYYY -> YYYY-MM-DD)
            const isDateInRange = (targetDate, start, end) => {
                if (!targetDate || !start) return false;
                const target = new Date(targetDate);
                const s = new Date(start);
                const e = end ? new Date(end) : s;
                // Saat farklarını normalize etmek için sadece tarih kısmını set et
                target.setHours(0,0,0,0);
                s.setHours(0,0,0,0);
                e.setHours(0,0,0,0);
                return target >= s && target <= e;
            };

            const getPersonnelStatusToday = (pName) => {
                if (!selectedCalendarDate) return null;
                const p = personnelList.find(x => x.name === pName);
                if (!p) return null;

                const [d, m, y] = selectedCalendarDate.split('.');
                const isoToday = `${y}-${m.padStart(2, '0')}-${d.padStart(2, '0')}`;

                if (p.leaves && p.leaves.some(l => isDateInRange(isoToday, l.start, l.end))) return "İZİNLİ";
                if (p.assignments && p.assignments.some(a => isDateInRange(isoToday, a.start, a.end))) return "GÖREVLİ";
                return null;
            };
            const [showDashboard, setShowDashboard] = useState(false);

            useEffect(() => {
                const loadAutoPDFs = async () => {
                    try {
                        const response = await fetch('/turnike_kayıt/');
                        if (!response.ok) return;
                        const htmlText = await response.text();
                        const pdfRegex = /href="([^"]+\.pdf)"/g;
                        const pdfLinks = [];
                        let match;
                        while ((match = pdfRegex.exec(htmlText)) !== null) {
                            let url = match[1];
                            if (url.startsWith('&#47;')) url = url.replace(/&#47;/g, '/');
                            pdfLinks.push(url);
                        }
                        if (pdfLinks.length === 0) return;
                        setIsProcessing(true);
                        let allParsedData = [];
                        for (const link of pdfLinks) {
                            const decodedLink = decodeURIComponent(link);
                            const fileRes = await fetch(decodedLink);
                            if (!fileRes.ok) continue;
                            const arrayBuffer = await fileRes.arrayBuffer();
                            const fileName = decodedLink.split('/').pop();
                            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                            let fullText = "";
                            for (let i = 1; i <= pdf.numPages; i++) {
                                const page = await pdf.getPage(i);
                                const textContent = await page.getTextContent();
                                const items = textContent.items.map(it => ({ str: it.str, y: it.transform[5], x: it.transform[4] }));
                                const rows = [];
                                let currentRowY = -1;
                                let currentRowText = [];
                                items.sort((a, b) => b.y - a.y || a.x - b.x);
                                items.forEach(it => {
                                    if (currentRowY === -1 || Math.abs(it.y - currentRowY) > 5) {
                                        if (currentRowText.length > 0) rows.push(currentRowText.join(""));
                                        currentRowY = it.y;
                                        currentRowText = [it.str];
                                    } else { currentRowText.push(it.str); }
                                });
                                if (currentRowText.length > 0) rows.push(currentRowText.join(""));
                                fullText += rows.join("\n") + "\n";
                            }
                            const fileParsedData = parseRawText(fullText, { name: fileName });
                            allParsedData = [...allParsedData, ...fileParsedData];
                        }
                        setParsedRows(prev => {
                            const existingMap = new Set(prev.map(r => r.raw + r.date));
                            const uniqueNew = allParsedData.filter(r => !existingMap.has(r.raw + r.date));
                            return [...prev, ...uniqueNew];
                        });
                        setIsProcessing(false);
                    } catch (err) {
                        console.error("Auto loading PDFs failed:", err);
                        setIsProcessing(false);
                    }
                };
                loadAutoPDFs();
            }, []);

            const handleAddPersonnel = () => {
                const cleanName = newPersonnelName.trim().toLocaleUpperCase('tr-TR');
                const cleanDept = newPersonnelDept.trim() || "Genel";
                if (cleanName && !personnelList.find(p => p.name === cleanName)) {
                    setPersonnelList([...personnelList, { name: cleanName, department: cleanDept, isActive: true }].sort((a, b) => a.name.localeCompare(b.name, 'tr-TR')));
                    setNewPersonnelName("");
                }
            };

            const togglePersonnelStatus = (e, name) => {
                e.stopPropagation();
                setPersonnelList(prev => prev.map(p => p.name === name ? { ...p, isActive: !p.isActive } : p));
            };

            const [editingPersonnel, setEditingPersonnel] = useState(null);
            const [editPersonnelName, setEditPersonnelName] = useState("");
            const [editPersonnelDept, setEditPersonnelDept] = useState("");

            const handleDeletePersonnel = (e, name) => {
                e.stopPropagation();
                if (window.confirm(`${name} isimli personeli silmek istediğinize emin misiniz?`)) {
                    setPersonnelList(personnelList.filter(p => p.name !== name));
                    if (selectedPersonnel === name) setSelectedPersonnel("TÜMÜ");
                }
            };

            const startEditingPersonnel = (e, name) => {
                e.stopPropagation();
                const p = personnelList.find(pers => pers.name === name);
                setEditingPersonnel(name);
                setEditPersonnelName(name);
                setEditPersonnelDept(p ? p.department : "");
            };

            const handleUpdatePersonnel = (e, oldName) => {
                e.stopPropagation();
                const cleanName = editPersonnelName.trim().toLocaleUpperCase('tr-TR');
                const cleanDept = editPersonnelDept.trim();

                if (!cleanName) {
                    setEditingPersonnel(null);
                    return;
                }

                // İsim değişmişse ve yeni isim listede varsa hata ver (kendisi hariç)
                if (cleanName !== oldName && personnelList.find(p => p.name === cleanName)) {
                    alert("Bu isimde bir personel zaten var!");
                    return;
                }

                setPersonnelList(prev => prev.map(p =>
                    p.name === oldName
                        ? { ...p, name: cleanName, department: cleanDept }
                        : p
                ));

                if (selectedPersonnel === oldName) {
                    setSelectedPersonnel(cleanName);
                }
                setEditingPersonnel(null);
            };

            const groupedPersonnel = useMemo(() => {
                const groups = {};
                personnelList.forEach(p => {
                    if (!groups[p.department]) groups[p.department] = [];
                    groups[p.department].push(p);
                });
                return groups;
            }, [personnelList]);

            const uniqueDepartments = useMemo(() => {
                return Object.keys(groupedPersonnel).sort((a, b) => a.localeCompare(b, 'tr-TR'));
            }, [groupedPersonnel]);

            const uniqueDatesList = useMemo(() => {
                if (!parsedRows.length) return [];
                return [...new Set(parsedRows.map(r => r.date))].sort((a, b) => {
                    const da = a.split('.').reverse().join('');
                    const db = b.split('.').reverse().join('');
                    return db.localeCompare(da);
                });
            }, [parsedRows]);

            // Mesai Kuralları (Dakika cinsinden)
            const RULES = useMemo(() => ({
                morningStart: toleranceEnabled ? (parseTime(morningStartStr) + toleranceMinutes) : parseTime(morningStartStr),
                morningEnd: parseTime(morningEndStr),
                afternoonStart: parseTime(afternoonStartStr),
                afternoonEnd: toleranceEnabled ? (parseTime(afternoonEndStr) - toleranceMinutes) : parseTime(afternoonEndStr),
                standardStart: parseTime(morningStartStr),
                standardEnd: parseTime(standardEndStr)
            }), [toleranceEnabled, toleranceMinutes, morningStartStr, morningEndStr, afternoonStartStr, afternoonEndStr, standardEndStr]);

            const handleFileChange = (e) => {
                const selectedFiles = Array.from(e.target.files).filter(f => f.type === "application/pdf");
                if (selectedFiles.length > 0) {
                    setFiles(selectedFiles);
                    setError(null);
                    setActiveFilter('ALL');
                } else {
                    setError("Lütfen geçerli PDF dosyaları yükleyin.");
                }
            };

            const extractTextFromPDF = async () => {
                if (!files || files.length === 0) return;
                setIsProcessing(true);
                setError(null);

                try {
                    let allParsedData = [];

                    for (const currentFile of files) {
                        const arrayBuffer = await currentFile.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;

                        let fullText = "";
                        for (let i = 1; i <= pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const textContent = await page.getTextContent();

                            const items = textContent.items.map(item => ({
                                str: item.str,
                                y: item.transform[5],
                                x: item.transform[4]
                            }));

                            const rows = [];
                            let currentRowY = -1;
                            let currentRowText = [];

                            items.sort((a, b) => b.y - a.y || a.x - b.x);

                            items.forEach(item => {
                                if (currentRowY === -1 || Math.abs(item.y - currentRowY) > 5) {
                                    if (currentRowText.length > 0) {
                                        rows.push(currentRowText.join(""));
                                    }
                                    currentRowY = item.y;
                                    currentRowText = [item.str];
                                } else {
                                    currentRowText.push(item.str);
                                }
                            });
                            if (currentRowText.length > 0) rows.push(currentRowText.join(""));

                            fullText += rows.join("\n") + "\n";
                        }
                        const fileParsedData = parseRawText(fullText, currentFile);
                        allParsedData = [...allParsedData, ...fileParsedData];
                    }

                    setParsedRows(prev => {
                        const existingMap = new Set(prev.map(r => r.raw + r.date));
                        const uniqueNew = allParsedData.filter(r => !existingMap.has(r.raw + r.date));
                        return [...prev, ...uniqueNew];
                    });

                } catch (err) {
                    console.error(err);
                    setError("PDF(ler) okunurken bir hata oluştu: " + err.message);
                    setIsProcessing(false);
                }
            };

            const parseRawText = (text, sourceFile) => {
                const lines = text.split('\n');
                const data = [];
                const dateRegex = /(\d{2}\.\d{2}\.\d{4})/;

                let documentDate = null;
                if (sourceFile && sourceFile.name) {
                    const matchPattern = sourceFile.name.match(dateRegex);
                    if (matchPattern) documentDate = matchPattern[0];
                }
                let lastFoundDate = documentDate;

                lines.forEach((line, idx) => {
                    let cleanLine = line.trim();
                    if (!cleanLine) return;


                    let rowDate = documentDate;
                    const dateMatch = cleanLine.match(dateRegex);

                    if (dateMatch) {
                        if (!rowDate) rowDate = dateMatch[0];
                        cleanLine = cleanLine.replace(dateMatch[0], "   ");
                    }
                    if (!rowDate) rowDate = lastFoundDate;
                    if (!rowDate) return;

                    const timeRegex = /(\d{1,2}[:.]\d{2})/g;
                    const times = cleanLine.match(timeRegex) || [];

                    let namePart = cleanLine.replace(timeRegex, " ").toLocaleUpperCase('tr-TR');

                    const wordsToRemove = [
                        "GEÇ GİRİŞ", "ERKEN ÇIKIŞ", "ÇIKIŞ YOK", "GİRİŞ YOK", "GEÇ", "ERKEN",
                        "GİRİŞ", "ÇIKIŞ", "GELMEDİ", "GELMEDI", "HAFTASONU", "GENEL TATİL", "GENEL TATIL",
                        "YILLIK İZİNLİ", "YILLIK İZİN", "YILLIK İZIN", "İZİNLİ", "IZINLI", "İZİN", "IZIN",
                        "RAPORLU", "RAPOR", "GÖREVLİ", "NORMAL", "YOK"
                    ];
                    wordsToRemove.forEach(w => {
                        namePart = namePart.split(w).join(" ");
                    });

                    namePart = namePart.replace(/[0-9\-_\*\/\\,;\"\(\)]/g, ' ');
                    namePart = namePart.replace(/\s+/g, ' ').trim();

                    if (namePart.length < 3) return;

                    const excludeWords = ["SAYFA", "RAPOR", "TURNİKE", "ŞİRKET", "LİSTESİ", "TARİH", "SAAT", "PERSONEL", "BELGE", "MÜDÜRLÜĞÜ", "DAİRESİ", "BAŞKANLIĞI"];
                    if (excludeWords.some(ex => namePart.includes(ex))) return;

                    const upperLine = cleanLine.toLocaleUpperCase('tr-TR');

                    // Güvenlik: Eğer satırda hiç turnike saati yoksa (izin, tatil, başlık çöpleri vb)
                    if (times.length === 0) {
                        // O halde listeye alınması için geçerli bir personel adı taşıması ŞARTTIR.
                        const isKnownPersonnel = personnelList.some(p => upperLine.includes(p.name));
                        if (!isKnownPersonnel) return;
                    }

                    // Onaylandı, satırdaki veya belgedeki mevcut son tarihi yedeğe al:
                    lastFoundDate = rowDate;

                    let note = "";
                    const keywords = ["GELMEDİ", "GELMEDI", "HAFTASONU", "GENEL TATİL", "GENEL TATIL", "ÇIKIŞ YOK", "GİRİŞ YOK", "YILLIK İZİNLİ", "YILLIK İZİN", "İZİNLİ", "IZINLI", "İZİN", "IZIN", "RAPORLU", "RAPOR", "GÖREVLİ"];

                    keywords.forEach(k => {
                        if (upperLine.includes(k)) {
                            let normalizedKey = k;
                            if (k.includes("GELMEDI")) normalizedKey = "GELMEDİ";
                            if (k.includes("TATIL")) normalizedKey = "GENEL TATİL";
                            if (k.includes("İZİN") || k.includes("IZIN") || k.includes("RAPOR") || k.includes("YILLIK")) normalizedKey = "İZİN";

                            if (!note.includes(normalizedKey)) {
                                note += normalizedKey + " ";
                            }
                        }
                    });

                    data.push({
                        raw: cleanLine,
                        name: namePart,
                        date: rowDate,
                        foundTimes: times,
                        note: note.trim(),
                        sourceFile: sourceFile
                    });
                });

                return data;
            };

            const calculateStatistics = useCallback(() => {
                if (!parsedRows.length) return;

                // Dinamik Akıllı Eşleştirme: Her bir kaydı, yeni personel eklense bile, listeye göre dinamik tara:
                const mappedRows = parsedRows.map(row => {
                    let finalName = row.name;
                    for (const p of personnelList) {
                        // Alias Desteği: PDF'te "AYKUT YAŞ" yazsa bile "AYKUŞ YAŞ" olarak eşleştir
                        if (finalName.includes(p.name) || (p.name === "AYKUŞ YAŞ" && finalName.includes("AYKUT YAŞ"))) {
                            finalName = p.name;
                            break;
                        }
                    }
                    return { ...row, matchedName: finalName };
                });

                const recordMap = new Map();

                // Matris Dinamik Oluşturma (Sadece O Tarihte PDF'te Adı Geçenler + Manuel İzinliler/Görevliler)
                uniqueDatesList.forEach(date => {
                    const personnelForThisDate = [...new Set(
                        mappedRows.filter(r => r.date === date).map(r => r.matchedName)
                    )].sort((a, b) => a.localeCompare(b, 'tr-TR'));

                    personnelForThisDate.forEach(name => {
                        recordMap.set(`${date}|${name}`, {
                            date: date,
                            name: name,
                            allTimes: [],
                            notes: new Set(["GELMEDİ"])
                        });
                    });
                });

                // --- MANUEL İZİN VE GÖREV ENJEKSİYONU ---
                personnelList.forEach(p => {
                    if (p.leaves) {
                        p.leaves.forEach(l => {
                            // Aralık için tüm tarihleri bul ve recordMap'e işle
                            let current = new Date(l.start);
                            const end = new Date(l.end || l.start);
                            while (current <= end) {
                                const formattedDate = `${String(current.getDate()).padStart(2, '0')}.${String(current.getMonth() + 1).padStart(2, '0')}.${current.getFullYear()}`;
                                const key = `${formattedDate}|${p.name}`;
                                if (!recordMap.has(key)) {
                                    recordMap.set(key, { date: formattedDate, name: p.name, allTimes: [], notes: new Set() });
                                }
                                recordMap.get(key).notes.add("İZİN");
                                current.setDate(current.getDate() + 1);
                            }
                        });
                    }
                    if (p.assignments) {
                        p.assignments.forEach(assign => {
                            let current = new Date(assign.start);
                            const end = new Date(assign.end || assign.start);
                            while (current <= end) {
                                const formattedDate = `${String(current.getDate()).padStart(2, '0')}.${String(current.getMonth() + 1).padStart(2, '0')}.${current.getFullYear()}`;
                                const key = `${formattedDate}|${p.name}`;
                                if (!recordMap.has(key)) {
                                    recordMap.set(key, { date: formattedDate, name: p.name, allTimes: [], notes: new Set() });
                                }
                                recordMap.get(key).notes.add("GÖREVLİ");
                                recordMap.get(key).manualNote = assign.place;
                                current.setDate(current.getDate() + 1);
                            }
                        });
                    }
                });

                // Gerçek kayıt verilerini matrise doldur, var olanların "GELMEDİ" etiketini sil (işlem gereği):
                mappedRows.forEach(row => {
                    const key = `${row.date}|${row.matchedName}`;
                    if (recordMap.has(key)) {
                        const rec = recordMap.get(key);
                        rec.notes.delete("GELMEDİ");

                        if (row.foundTimes && row.foundTimes.length > 0) {
                            row.foundTimes.forEach(t => {
                                const mins = timeToMinutes(t);
                                if (mins !== null) rec.allTimes.push(mins);
                            });
                        }
                        if (row.note) rec.notes.add(row.note.toLocaleUpperCase('tr-TR'));
                        if (row.sourceFile && !rec.sourceFile) {
                            rec.sourceFile = row.sourceFile;
                        }
                    }
                });

                if (recordMap.size === 0) {
                    setError("Bu isimde veya tarihte kayıt bulunamadı.");
                    setStats(null);
                    return;
                }

                let totalUniqueDays = 0;
                let gelmediCount = 0;
                let geldiCount = 0;
                let gecGirisCount = 0;
                let erkenCikisCount = 0;
                let overtimeCount = 0;
                let after18Count = 0;
                let izinliCount = 0;

                const processedDays = [];

                recordMap.forEach((dayData) => {
                    // Şüpheli gece yarısı verilerini filtrele (örn: 00:04 gibi sayfa altlıkları)
                    // Eğer gün içinde 05:00'dan sonra herhangi bir kayıt varsa, 05:00 öncesini "çöp veri" kabul et.
                    const hasValidDayTime = dayData.allTimes.some(t => t > 300); // 300 dk = 05:00
                    if (hasValidDayTime) {
                        dayData.allTimes = dayData.allTimes.filter(t => t > 300);
                    }

                    dayData.allTimes.sort((a, b) => a - b);
                    const combinedNotes = Array.from(dayData.notes || []).join(" ");

                    const [dayStr, monthStr, yearStr] = dayData.date.split('.');
                    const d = new Date(yearStr, monthStr - 1, dayStr);
                    const dayOfWeek = d.getDay();
                    const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;

                    const firstEntry = dayData.allTimes.length > 0 ? dayData.allTimes[0] : null;
                    const lastExit = dayData.allTimes.length > 1 ? dayData.allTimes[dayData.allTimes.length - 1] : null;


                    let isAbsent = false;
                    let isLate = false;
                    let isEarlyExit = false;
                    let isPresent = false;
                    let isOvertime = false;
                    let isOnLeave = false;

                    // Dinamik Tatil Kontrolü
                    const holidayInfo = Array.isArray(holidays) && holidays.find(h => {
                        if (!h || !h.date) return false;
                        const [y, m, d_api] = h.date.split('-');
                        return `${d_api}.${m}.${y}` === dayData.date;
                    });

                    const isApiHoliday = holidayInfo && holidayInfo.isHoliday;
                    const isWeekendOrHoliday = isWeekend || isApiHoliday || combinedNotes.includes("HAFTASONU") || combinedNotes.includes("TATİL");

                    if (combinedNotes.includes("İZİN") || combinedNotes.includes("RAPOR") || combinedNotes.includes("GÖREVLİ")) {
                        isOnLeave = true;
                    }

                    if (combinedNotes.includes("GELMEDİ")) {
                        isAbsent = true;
                    }

                    // --- TÜM LİSTE GETİRME (FİLTRELERİ KALDIRDIK) ---
                    // Tüm günleri listeye ekliyoruz.
                    totalUniqueDays++;

                    let effectiveExit = lastExit;

                    if (!isAbsent && (effectiveExit !== null || firstEntry !== null)) {
                        isPresent = true;
                    }

                    // 3. Geç Giriş Kontrolü
                    // KURAL: Sadece Hafta İçi (!isWeekendOrHoliday) VE Giriş Saati VARSA (firstEntry !== null).
                    if (!isWeekendOrHoliday && isPresent && firstEntry !== null) {
                        if (firstEntry > RULES.morningStart) {
                            isLate = true;
                        }
                    }

                    // 4. Erken Çıkış Kontrolü
                    // KURAL: Sadece Hafta İçi (!isWeekendOrHoliday) ise Erken Çıkış say.
                    if (!isWeekendOrHoliday && isPresent && effectiveExit !== null) {
                        if (effectiveExit < RULES.afternoonEnd) {
                            isEarlyExit = true;
                        }
                    }

                    // 5. Fazla Mesai Kontrolü
                    if (isPresent) {
                        if (isWeekendOrHoliday) {
                            // Hafta sonu giriş varsa fazla mesaidir
                            if (firstEntry !== null) {
                                isOvertime = true;
                            }
                        }
                        else {
                            // Hafta İçi:
                            // KURAL: Çıkış saati YOKSA (veya ÇIKIŞ YOK hatası varsa) hesaplama.
                            // Sadece çıkış saati varsa (effectiveExit !== null) hesapla.
                            if (effectiveExit !== null) {
                                // Hafta içi 19:31 sonrası çıkışlar mesaidir (18:30-19:30 mola kabul edilir)
                                const isLateEnd = effectiveExit >= 1171; // 19:31

                                if (isLateEnd) {
                                    isOvertime = true;
                                }
                            }
                        }
                    }

                    // 6. 18:00 Sonrası Çıkış Kontrolü
                    const isAfter18 = isPresent && effectiveExit !== null && effectiveExit > 1080; // 1080 = 18 * 60

                    // SAYAÇ HESAPLAMA
                    // Hafta sonları Geldi, Gelmedi, Geç, Erken sayaçlarına ASLA dahil edilmez.

                    let finalStatus = 'Boş';
                    if (isAbsent) finalStatus = 'Gelmedi';
                    else if (isOnLeave) finalStatus = 'İzinli';
                    else if (isPresent) finalStatus = 'Geldi';
                    else if (isWeekendOrHoliday) finalStatus = 'Tatil/Haftasonu';

                    if (isAbsent && !isWeekendOrHoliday && !isOnLeave) gelmediCount++;
                    if (isPresent && !isWeekendOrHoliday && !isOnLeave) geldiCount++;
                    if (isLate && !isWeekendOrHoliday && !isOnLeave) gecGirisCount++;
                    if (isEarlyExit && !isWeekendOrHoliday && !isOnLeave) erkenCikisCount++;

                    if (isOnLeave && !isWeekendOrHoliday) izinliCount++;

                    if (isOvertime) overtimeCount++;
                    if (isAfter18) after18Count++;

                    const displayEntry = (isAbsent || isOnLeave || firstEntry === null) ? '' : minutesToTime(firstEntry);
                    const displayExit = (isAbsent || isOnLeave || effectiveExit === null) ? '' : minutesToTime(effectiveExit);

                    processedDays.push({
                        date: dayData.date,
                        name: dayData.name,
                        status: finalStatus,
                        entry: displayEntry,
                        exit: displayExit,
                        isLate,
                        isEarlyExit,
                        isOvertime,
                        isOnLeave,
                        isWeekend,
                        isHoliday: isWeekendOrHoliday,
                        isAfter18: isAfter18,
                        note: combinedNotes + (dayData.manualNote ? " (" + dayData.manualNote + ")" : ""),
                        sourceFile: dayData.sourceFile
                    });
                });

                processedDays.sort((a, b) => {
                    const da = a.date.split('.').reverse().join('');
                    const db = b.date.split('.').reverse().join('');
                    return da.localeCompare(db);
                });

                setStats({
                    totalUniqueDays,
                    gelmediCount,
                    geldiCount,
                    gecGirisCount,
                    erkenCikisCount,
                    overtimeCount,
                    izinliCount,
                    after18Count,
                    details: processedDays
                });
                setActiveFilter('ALL');
                setError(null);
            }, [parsedRows, personnelList, uniqueDatesList, RULES]);

            useEffect(() => {
                if (files && files.length > 0) {
                    extractTextFromPDF();
                }
            }, [files]);

            useEffect(() => {
                if (parsedRows.length > 0) {
                    calculateStatistics();
                }
            }, [toleranceEnabled, toleranceMinutes, calculateStatistics, parsedRows]);

            const baseFilteredDetails = useMemo(() => {
                if (!stats || !stats.details) return [];
                let temp = stats.details;

                // 1. Sol Menü Personel Filtresi
                if (selectedPersonnel !== "TÜMÜ") {
                    temp = temp.filter(d => d.name === selectedPersonnel);
                }

                // 2. Global Search (İsim, Tarih, Durum, Not)
                if (globalSearch.trim()) {
                    const term = globalSearch.toLocaleLowerCase('tr-TR').trim();
                    temp = temp.filter(d =>
                        d.name.toLocaleLowerCase('tr-TR').includes(term) ||
                        d.date.includes(term) ||
                        (d.note && d.note.toLocaleLowerCase('tr-TR').includes(term)) ||
                        d.status.toLocaleLowerCase('tr-TR').includes(term)
                    );
                }

                // 3. Takvim Filtresi
                if (selectedCalendarDate) {
                    temp = temp.filter(d => d.date === selectedCalendarDate);
                }

                return temp;
            }, [stats, selectedPersonnel, globalSearch, selectedCalendarDate]);

            const dynamicStats = useMemo(() => {
                let gelmediCount = 0;
                let geldiCount = 0;
                let gecGirisCount = 0;
                let erkenCikisCount = 0;
                let overtimeCount = 0;
                let izinliCount = 0;
                let after18Count = 0;
                let uniqueDaysSet = new Set();

                if (baseFilteredDetails) {
                    baseFilteredDetails.forEach(d => {
                        uniqueDaysSet.add(d.date);

                        if (d.status === 'Gelmedi' && !d.isHoliday && !d.isOnLeave) gelmediCount++;
                        if (d.status === 'Geldi' && !d.isHoliday && !d.isOnLeave) geldiCount++;
                        if (d.isLate && !d.isHoliday && !d.isOnLeave) gecGirisCount++;
                        if (d.isEarlyExit && !d.isHoliday && !d.isOnLeave) erkenCikisCount++;
                        if (d.isOnLeave && !d.isHoliday) izinliCount++;
                        if (d.isOvertime) overtimeCount++;
                        if (d.isAfter18) after18Count++;
                    });
                }

                return {
                    totalUniqueDays: uniqueDaysSet.size,
                    gelmediCount, geldiCount, gecGirisCount, erkenCikisCount, overtimeCount, izinliCount, after18Count,
                    details: baseFilteredDetails
                };
            }, [baseFilteredDetails]);

            const filteredDetails = useMemo(() => {
                if (!baseFilteredDetails) return [];

                let temp = baseFilteredDetails;

                // 3. Üst Kart Filtresi (Durum)
                switch (activeFilter) {
                    case 'ABSENT': temp = temp.filter(d => d.status === 'Gelmedi' && !d.isHoliday); break;
                    case 'LEAVE': temp = temp.filter(d => d.isOnLeave); break;
                    case 'PRESENT': temp = temp.filter(d => d.status === 'Geldi' && !d.isHoliday); break;
                    case 'LATE': temp = temp.filter(d => d.isLate && !d.isHoliday); break;
                    case 'EARLY': temp = temp.filter(d => d.isEarlyExit && !d.isHoliday); break;
                    case 'OVERTIME': temp = temp.filter(d => d.isOvertime); break;
                    case 'AFTER_18': temp = temp.filter(d => d.isAfter18); break;
                    default: break;
                }

                return temp;
            }, [baseFilteredDetails, activeFilter]);

            const getFilterTitle = () => {
                switch (activeFilter) {
                    case 'ABSENT': return "Filtre: Gelmediği Günler (Hafta İçi)";
                    case 'LEAVE': return "Filtre: İzinli / Raporlu Günler";
                    case 'PRESENT': return "Filtre: Geldiği Günler (Hafta İçi)";
                    case 'LATE': return "Filtre: Geç Kaldığı Günler (Hafta İçi)";
                    case 'EARLY': return "Filtre: Erken Çıktığı Günler (Hafta İçi)";
                    case 'OVERTIME': return 'Fazla Mesai Yapanlar';
                    case 'AFTER_18': return '18:00 Sonrası Çıkış Yapanlar';
                    default: return 'Tüm Kayıtlar';
                }
            };

            const getRowStyle = (day) => {
                if (day.status === 'Gelmedi') return 'bg-red-50';
                if (day.isOnLeave) return 'bg-teal-50/50';
                if (day.isHoliday) return 'bg-slate-100'; // Hafta sonu rengi
                return 'bg-white'; // Hafta içi rengi
            };

            return (
                <div className="flex flex-col lg:flex-row min-h-screen bg-[#f8fafc] font-sans overflow-x-hidden">
                    {/* Sol Menü (Sidebar) */}
                    <aside className="w-full lg:w-72 bg-white border-r border-gray-200 flex flex-col shrink-0 lg:h-screen lg:sticky top-0 z-40">
                        {/* Calendar */}
                        <div className="p-4 border-b border-gray-100 hidden md:block">
                            <MiniCalendar
                                selectedDate={selectedCalendarDate}
                                onSelectDate={setSelectedCalendarDate}
                                highlightedDates={uniqueDatesList}
                                holidays={holidays}
                            />
                        </div>

                        {/* Personnel List */}
                        <div className="p-4 flex flex-col flex-1 min-h-[300px] overflow-hidden">
                            <div className="flex items-center justify-between mb-4">
                                <span className="text-[11px] font-bold text-gray-500 tracking-wider">PERSONEL YÖNETİMİ</span>
                                <button onClick={() => setSelectedPersonnel('TÜMÜ')} className={`text-[11px] font-bold tracking-wider hover:text-blue-800 transition-colors ${selectedPersonnel === 'TÜMÜ' ? 'text-blue-700' : 'text-blue-500'}`}>TÜMÜ</button>
                            </div>

                            {/* Add Personnel Form */}
                            <div className="flex flex-col gap-2 mb-6 bg-gray-50/50 p-3 rounded-xl border border-gray-100 shadow-sm">
                                <input
                                    type="text"
                                    value={newPersonnelName}
                                    onChange={e => setNewPersonnelName(e.target.value)}
                                    placeholder="Personel Adı Soyadı..."
                                    className="w-full border border-gray-200 rounded-lg px-3 py-2 text-xs outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all placeholder:text-gray-400 bg-white"
                                />
                                <div className="flex gap-2">
                                    <select
                                        value={newPersonnelDept}
                                        onChange={e => setNewPersonnelDept(e.target.value)}
                                        className="flex-1 min-w-0 border border-gray-200 rounded-lg px-3 py-2 text-xs outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all bg-white appearance-none cursor-pointer"
                                    >
                                        {uniqueDepartments.map(dept => (
                                            <option key={dept} value={dept}>{dept}</option>
                                        ))}
                                    </select>
                                    <button onClick={handleAddPersonnel} className="bg-blue-600 hover:bg-blue-700 text-white rounded-lg w-10 flex items-center justify-center font-bold text-xl transition-all shadow-sm active:scale-95">+</button>
                                </div>
                            </div>

                            <div className="mb-2 px-2 flex items-center gap-2">
                                <span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">ŞUBE MÜDÜRLÜKLERİ</span>
                                <div className="h-px flex-1 bg-gray-100"></div>
                            </div>

                            <div className="overflow-y-auto flex-1 -mx-2 px-2 custom-scrollbar space-y-2">
                                {Object.entries(groupedPersonnel).sort((a, b) => a[0].localeCompare(b[0], 'tr-TR')).map(([dept, members]) => {
                                    const isOpen = !!openDepts[dept];
                                    const toggleDept = () => setOpenDepts(prev => ({ ...prev, [dept]: !prev[dept] }));

                                    return (
                                        <div key={dept} className="bg-gray-50/30 rounded-xl overflow-hidden border border-transparent hover:border-gray-100 transition-all">
                                            <div
                                                onClick={toggleDept}
                                                className="flex items-center gap-2 px-3 py-2.5 cursor-pointer hover:bg-gray-100/50 transition-colors group"
                                            >
                                                {isOpen ? <ChevronDown className="w-3.5 h-3.5 text-gray-400 group-hover:text-blue-500" /> : <ChevronRight className="w-3.5 h-3.5 text-gray-400 group-hover:text-blue-500" />}
                                                <h4 className="flex-1 text-[10px] font-black text-gray-500 uppercase tracking-[0.1em] truncate">{dept}</h4>
                                                <span className="text-[10px] font-bold text-gray-400 bg-gray-100 px-1.5 py-0.5 rounded-full">{members.length}</span>
                                            </div>

                                            {isOpen && (
                                                <div className="px-1 pb-2 space-y-0.5 animate-in slide-in-from-top-1 duration-200">
                                                    {members.sort((a, b) => a.name.localeCompare(b.name, 'tr-TR')).map(p => (
                                                        <div
                                                            key={p.name}
                                                            onClick={() => { if (editingPersonnel !== p.name) setSelectedPersonnel(p.name); }}

                                                                                    </div>
                                                                                </td>
                                                                                <td className="px-5 py-3.5 text-sm text-gray-500 italic group-hover/row:text-gray-700 transition-colors">{day.note}</td>
                                                                            </tr>
                                                                        ))}
                                                                    </tbody>
                                                                </table>
                                                            </div>
                                                        </div>
                                                    </details>
                                                ));
                                            })()}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>

                    {/* Dashboard Modal */}
                    {showDashboard && (
                        <DashboardModal
                            isOpen={showDashboard}
                            onClose={() => setShowDashboard(false)}
                            data={dynamicStats}
                            rules={{
                                morningStart: morningStartStr,
                                morningEnd: morningEndStr,
                                afternoonStart: afternoonStartStr,
                                afternoonEnd: afternoonEndStr,
                                tolerance: toleranceMinutes,
                                standardEnd: standardEndStr
                            }}
                        />
                    )}

                    {/* Personel Yönetimi Modal */}
                    {isPersonnelManagementOpen && (
                        <PersonnelManagementModal
                            isOpen={isPersonnelManagementOpen}
                            onClose={() => setIsPersonnelManagementOpen(false)}
                            personnelList={personnelList}
                            setPersonnelList={setPersonnelList}
                        />
                    )}

                    {/* PDF Modal */}
                    {selectedPdfBlob && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-fade-in">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-5xl h-[90vh] flex flex-col overflow-hidden">
                                <div className="flex items-center justify-between px-6 py-4 border-b border-gray-100 bg-gray-50/50">
                                    <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2">
                                        <FileText className="w-5 h-5 text-blue-500" /> PDF Önizleme
                                    </h3>
                                    <button
                                        onClick={() => setSelectedPdfBlob(null)}
                                        className="p-1.5 hover:bg-red-50 text-gray-400 hover:text-red-500 rounded-lg transition-colors"
                                        title="Kapat"
                                    >
                                        <X className="w-6 h-6" />
                                    </button>
                                </div>
                                <div className="flex-1 overflow-hidden bg-gray-100 p-2">
                                    <iframe src={selectedPdfBlob} className="w-full h-full rounded shadow-sm border border-gray-200 bg-white" title="PDF Önizleme" />
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
